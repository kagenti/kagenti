<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <pattern id="grid-bp" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d4f7a" stroke-opacity="0.18" stroke-width="0.7"/>
    </pattern>
    <pattern id="gridMajor-bp" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#1d4f7a" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <linearGradient id="bgBP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d3a5e"/>
      <stop offset="100%" stop-color="#0a2440"/>
    </linearGradient>
    <marker id="arrow-bp" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#cfe7ff"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgBP)"/>
  <rect width="1920" height="1080" fill="url(#grid-bp)"/>
  <rect width="1920" height="1080" fill="url(#gridMajor-bp)"/>

  <!-- corner ticks for blueprint feel -->
  <g stroke="#cfe7ff" stroke-opacity="0.55" stroke-width="1.5" fill="none">
    <path d="M30,30 L80,30 M30,30 L30,80"/>
    <path d="M1890,30 L1840,30 M1890,30 L1890,80"/>
    <path d="M30,1050 L80,1050 M30,1050 L30,1000"/>
    <path d="M1890,1050 L1840,1050 M1890,1050 L1890,1000"/>
  </g>

  <!-- Title block -->
  <g>
    <rect x="60" y="50" width="700" height="90" fill="#0a2440" stroke="#cfe7ff" stroke-opacity="0.6"/>
    <text x="80" y="92" font-size="32" font-weight="700" fill="#cfe7ff">KAGENTI · OBSERVABILITY</text>
    <text x="80" y="122" font-size="16" fill="#7fb6e6" font-family="'JetBrains Mono',monospace">SHEET 1/1 — OTEL TRACE PIPELINE — REV. 0.122.1</text>
  </g>
  <g>
    <rect x="1160" y="50" width="700" height="90" fill="#0a2440" stroke="#cfe7ff" stroke-opacity="0.6"/>
    <text x="1180" y="86" font-size="14" fill="#7fb6e6" font-family="'JetBrains Mono',monospace">CLUSTER ......... kind / hypershift</text>
    <text x="1180" y="106" font-size="14" fill="#7fb6e6" font-family="'JetBrains Mono',monospace">NS .............. kagenti-system</text>
    <text x="1180" y="126" font-size="14" fill="#7fb6e6" font-family="'JetBrains Mono',monospace">PROTOCOL ........ OTLP/gRPC plaintext :8335</text>
  </g>

  <!-- Cluster boundary -->
  <g>
    <rect x="80" y="180" width="1760" height="700" fill="none" stroke="#cfe7ff" stroke-opacity="0.65" stroke-dasharray="2 6" stroke-width="1.5"/>
    <text x="100" y="208" font-size="14" font-family="'JetBrains Mono',monospace" fill="#cfe7ff">CLUSTER BOUNDARY</text>
  </g>

  <!-- Workload swimlane (team1/team2) -->
  <g>
    <rect x="120" y="240" width="420" height="600" fill="#0e3050" stroke="#cfe7ff" stroke-opacity="0.45" stroke-dasharray="4 4"/>
    <text x="140" y="270" font-size="14" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">NAMESPACE: team1 / team2</text>

    <!-- A2A pods (k8s-style hexagon-ish) -->
    <g transform="translate(160,300)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">PODS · A2A AGENTS</text>
      <g transform="translate(0,20)">
        <g>
          <polygon points="0,30 30,5 70,5 100,30 100,70 70,95 30,95 0,70" fill="#1d4f7a" stroke="#cfe7ff"/>
          <text x="50" y="56" text-anchor="middle" font-size="12" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">a2a-1</text>
        </g>
        <g transform="translate(120,0)">
          <polygon points="0,30 30,5 70,5 100,30 100,70 70,95 30,95 0,70" fill="#1d4f7a" stroke="#cfe7ff"/>
          <text x="50" y="56" text-anchor="middle" font-size="12" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">a2a-2</text>
        </g>
        <g transform="translate(240,0)">
          <polygon points="0,30 30,5 70,5 100,30 100,70 70,95 30,95 0,70" fill="#1d4f7a" stroke="#cfe7ff"/>
          <text x="50" y="56" text-anchor="middle" font-size="12" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">a2a-N</text>
        </g>
      </g>
    </g>

    <!-- MCP tool pods -->
    <g transform="translate(160,460)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">PODS · MCP TOOLS</text>
      <g transform="translate(0,20)">
        <g>
          <polygon points="0,30 30,5 70,5 100,30 100,70 70,95 30,95 0,70" fill="#3a5a3a" stroke="#cfe7ff"/>
          <text x="50" y="56" text-anchor="middle" font-size="12" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">mcp-1</text>
        </g>
        <g transform="translate(120,0)">
          <polygon points="0,30 30,5 70,5 100,30 100,70 70,95 30,95 0,70" fill="#3a5a3a" stroke="#cfe7ff"/>
          <text x="50" y="56" text-anchor="middle" font-size="12" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">mcp-2</text>
        </g>
        <g transform="translate(240,0)">
          <polygon points="0,30 30,5 70,5 100,30 100,70 70,95 30,95 0,70" fill="#3a5a3a" stroke="#cfe7ff"/>
          <text x="50" y="56" text-anchor="middle" font-size="12" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">mcp-N</text>
        </g>
      </g>
    </g>

    <!-- Backend -->
    <g transform="translate(160,620)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">DEPLOYMENT · BACKEND</text>
      <rect x="0" y="20" width="340" height="80" fill="#1d4f7a" stroke="#cfe7ff"/>
      <text x="170" y="65" text-anchor="middle" font-size="20" font-weight="700" fill="#cfe7ff">Kagenti Backend</text>
    </g>

    <!-- env var note -->
    <g transform="translate(160,750)">
      <rect x="0" y="0" width="340" height="68" fill="none" stroke="#cfe7ff" stroke-opacity="0.6" stroke-dasharray="3 3"/>
      <text x="12" y="22" font-size="12" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">ENV (injected by Kagenti)</text>
      <text x="12" y="44" font-size="13" font-family="'JetBrains Mono',monospace" fill="#cfe7ff">OTEL_EXPORTER_OTLP_</text>
      <text x="12" y="60" font-size="13" font-family="'JetBrains Mono',monospace" fill="#cfe7ff">ENDPOINT=…:8335</text>
    </g>
  </g>

  <!-- Collector swimlane -->
  <g>
    <rect x="700" y="240" width="520" height="600" fill="#0e3050" stroke="#cfe7ff" stroke-opacity="0.45" stroke-dasharray="4 4"/>
    <text x="720" y="270" font-size="14" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">NAMESPACE: kagenti-system</text>

    <!-- Service -->
    <g transform="translate(740,300)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">SERVICE</text>
      <rect x="0" y="20" width="440" height="100" fill="#1d4f7a" stroke="#cfe7ff" stroke-width="1.5"/>
      <text x="220" y="60" text-anchor="middle" font-size="20" font-weight="700" fill="#cfe7ff">otel-collector</text>
      <text x="220" y="92" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">.kagenti-system.svc.cluster.local:8335</text>
    </g>

    <!-- Pod -->
    <g transform="translate(740,460)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">POD · IMAGE</text>
      <rect x="0" y="20" width="440" height="120" fill="#143b5e" stroke="#cfe7ff" stroke-width="1.5"/>
      <circle cx="40" cy="80" r="22" fill="none" stroke="#cfe7ff" stroke-width="1.5"/>
      <path d="M40,58 L52,68 L52,92 L40,102 L28,92 L28,68 Z" fill="none" stroke="#cfe7ff"/>
      <text x="80" y="68" font-size="18" font-weight="700" fill="#cfe7ff">otel/opentelemetry-</text>
      <text x="80" y="92" font-size="18" font-weight="700" fill="#cfe7ff">collector-contrib</text>
      <text x="80" y="118" font-size="13" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">tag: 0.122.1</text>
    </g>

    <!-- ConfigMap -->
    <g transform="translate(740,640)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">CONFIGMAP</text>
      <rect x="0" y="20" width="440" height="80" fill="#1d4f7a" stroke="#cfe7ff" stroke-dasharray="6 4"/>
      <text x="220" y="52" text-anchor="middle" font-size="16" font-weight="700" fill="#cfe7ff">otel-collector-config</text>
      <text x="220" y="76" text-anchor="middle" font-size="12" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">receivers · processors · exporters</text>
    </g>

    <!-- mount line -->
    <g stroke="#cfe7ff" stroke-opacity="0.7" stroke-width="1.2" stroke-dasharray="4 3" fill="none">
      <path d="M960,640 L960,580" marker-end="url(#arrow-bp)"/>
    </g>
    <text x="970" y="616" font-size="11" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">/etc/otelcol/config.yaml</text>
  </g>

  <!-- Exporters swimlane -->
  <g>
    <rect x="1300" y="240" width="500" height="600" fill="#0e3050" stroke="#cfe7ff" stroke-opacity="0.45" stroke-dasharray="4 4"/>
    <text x="1320" y="270" font-size="14" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">EXPORTER TARGETS</text>

    <!-- mlflow -->
    <g transform="translate(1340,300)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">SERVICE · mlflow</text>
      <rect x="0" y="20" width="420" height="120" fill="#5a3318" stroke="#ffb27a"/>
      <text x="210" y="62" text-anchor="middle" font-size="22" font-weight="700" fill="#ffd9b8">mlflow</text>
      <text x="210" y="92" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#ffd9b8">http://mlflow:5000</text>
      <text x="210" y="114" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#ffd9b8">/v1/traces</text>
    </g>

    <!-- postgres -->
    <g transform="translate(1340,470)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">DATABASE · postgres-otel</text>
      <g transform="translate(0,20)">
        <ellipse cx="210" cy="14" rx="210" ry="14" fill="#1d4f7a" stroke="#cfe7ff"/>
        <rect x="0" y="14" width="420" height="80" fill="#1d4f7a" stroke="#cfe7ff"/>
        <ellipse cx="210" cy="94" rx="210" ry="14" fill="#0a2440" stroke="#cfe7ff"/>
        <text x="210" y="62" text-anchor="middle" font-size="20" font-weight="700" fill="#cfe7ff">postgres-otel</text>
      </g>
    </g>

    <!-- pvc -->
    <g transform="translate(1340,640)">
      <text x="0" y="0" font-size="14" fill="#cfe7ff" font-family="'JetBrains Mono',monospace">VOLUME</text>
      <rect x="0" y="20" width="420" height="60" fill="none" stroke="#cfe7ff" stroke-dasharray="6 4"/>
      <text x="210" y="58" text-anchor="middle" font-size="16" fill="#cfe7ff">PV / PVC</text>
    </g>

    <g stroke="#cfe7ff" stroke-opacity="0.7" stroke-width="1.2" stroke-dasharray="4 3" fill="none">
      <path d="M1550,640 L1550,584" marker-end="url(#arrow-bp)"/>
    </g>
  </g>

  <!-- Cross-lane arrows -->
  <g stroke="#cfe7ff" stroke-width="1.8" fill="none" marker-end="url(#arrow-bp)">
    <path d="M540,360 L740,360"/>
    <path d="M540,520 L740,400"/>
    <path d="M540,680 L740,440"/>
    <path d="M1180,360 L1340,360"/>
    <path d="M1180,520 L1340,520"/>
  </g>
  <g font-size="11" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">
    <text x="555" y="354">OTLP/gRPC</text>
    <text x="1195" y="354">OTLP → exporter</text>
    <text x="1195" y="514">SQL writes</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60,910)">
    <rect x="0" y="0" width="1800" height="140" fill="#0a2440" stroke="#cfe7ff" stroke-opacity="0.55"/>
    <text x="20" y="28" font-size="14" font-family="'JetBrains Mono',monospace" fill="#7fb6e6">LEGEND</text>

    <g transform="translate(20,50)">
      <rect width="40" height="22" fill="#1d4f7a" stroke="#cfe7ff"/>
      <text x="52" y="17" font-size="13" fill="#cfe7ff">k8s Service</text>
    </g>
    <g transform="translate(180,50)">
      <polygon points="0,11 12,2 28,2 40,11 40,20 28,29 12,29 0,20" fill="#1d4f7a" stroke="#cfe7ff"/>
      <text x="52" y="17" font-size="13" fill="#cfe7ff">Pod</text>
    </g>
    <g transform="translate(280,50)">
      <rect width="40" height="22" fill="#1d4f7a" stroke="#cfe7ff" stroke-dasharray="4 3"/>
      <text x="52" y="17" font-size="13" fill="#cfe7ff">ConfigMap</text>
    </g>
    <g transform="translate(440,42)">
      <ellipse cx="20" cy="6" rx="20" ry="6" fill="#1d4f7a" stroke="#cfe7ff"/>
      <rect y="6" width="40" height="20" fill="#1d4f7a" stroke="#cfe7ff"/>
      <ellipse cx="20" cy="26" rx="20" ry="6" fill="#0a2440" stroke="#cfe7ff"/>
      <text x="52" y="25" font-size="13" fill="#cfe7ff">Database / PVC</text>
    </g>
    <g transform="translate(640,50)">
      <rect width="40" height="22" fill="#5a3318" stroke="#ffb27a"/>
      <text x="52" y="17" font-size="13" fill="#cfe7ff">External / UI</text>
    </g>
    <g transform="translate(820,55)">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#cfe7ff" stroke-width="1.8" marker-end="url(#arrow-bp)"/>
      <text x="52" y="14" font-size="13" fill="#cfe7ff">Trace flow</text>
    </g>
    <g transform="translate(980,55)">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#cfe7ff" stroke-width="1.2" stroke-dasharray="4 3"/>
      <text x="52" y="14" font-size="13" fill="#cfe7ff">Mount / dependency</text>
    </g>

    <text x="20" y="108" font-size="14" fill="#cfe7ff">NOTE — Kagenti provides observability configuration; 100% of the implementation is open source.  LangChain and Claude are pre-instrumented for OTLP.</text>
  </g>
</svg>
