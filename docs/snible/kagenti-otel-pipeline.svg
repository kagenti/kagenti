<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bgPL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfdff"/>
      <stop offset="100%" stop-color="#eaf1f7"/>
    </linearGradient>

    <!-- ribbon gradients per stage -->
    <linearGradient id="ribbonEmit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a02b93" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#a02b93" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a02b93" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="ribbonCollect" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#156082" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#156082"/>
    </linearGradient>
    <linearGradient id="ribbonStore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f7a4d" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1f7a4d"/>
    </linearGradient>
    <linearGradient id="ribbonView" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e9712f" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c25a18"/>
    </linearGradient>

    <linearGradient id="cardEmit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b14fa8"/>
      <stop offset="100%" stop-color="#7a2c75"/>
    </linearGradient>
    <linearGradient id="cardCollect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f8fbf"/>
      <stop offset="100%" stop-color="#0e4c6c"/>
    </linearGradient>
    <linearGradient id="cardStore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3aa372"/>
      <stop offset="100%" stop-color="#1f7a4d"/>
    </linearGradient>
    <linearGradient id="cardView" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f08a3a"/>
      <stop offset="100%" stop-color="#c25a18"/>
    </linearGradient>

    <filter id="shadowPL" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrowPL" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 Z" fill="#0e2433"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgPL)"/>

  <!-- Title -->
  <text x="960" y="80" text-anchor="middle" font-size="44" font-weight="700" fill="#0e2433">Kagenti · OpenTelemetry trace pipeline</text>
  <text x="960" y="118" text-anchor="middle" font-size="22" fill="#4a6275">A four-stage flow — emit · collect · store · view</text>

  <!-- Stage labels above -->
  <g font-size="20" font-weight="700" text-anchor="middle">
    <text x="280" y="200" fill="#7a2c75">EMIT</text>
    <text x="780" y="200" fill="#0e4c6c">COLLECT</text>
    <text x="1240" y="200" fill="#1f7a4d">STORE</text>
    <text x="1680" y="200" fill="#c25a18">VIEW</text>
  </g>
  <g font-size="13" text-anchor="middle" fill="#4a6275">
    <text x="280" y="222">instrumented workloads</text>
    <text x="780" y="222">otel-collector</text>
    <text x="1240" y="222">postgres / OTLP backends</text>
    <text x="1680" y="222">mlflow UI</text>
  </g>

  <!-- The flowing ribbon (single shape so it visually unifies) -->
  <g>
    <path d="M120,540 L520,540 L640,440 L920,440 L1040,540 L1320,540 L1440,440 L1820,440"
          stroke="#cfd8e2" stroke-width="46" fill="none" stroke-linecap="round" opacity="0.55"/>
    <!-- segment overlays per stage -->
    <path d="M120,540 L520,540" stroke="url(#ribbonEmit)" stroke-width="34" fill="none" stroke-linecap="round"/>
    <path d="M520,540 L640,440 L920,440" stroke="url(#ribbonCollect)" stroke-width="34" fill="none" stroke-linecap="round"/>
    <path d="M920,440 L1040,540 L1320,540" stroke="url(#ribbonStore)" stroke-width="34" fill="none" stroke-linecap="round"/>
    <path d="M1320,540 L1440,440 L1820,440" stroke="url(#ribbonView)" stroke-width="34" fill="none" stroke-linecap="round"/>
  </g>

  <!-- moving spans dots (decorative) -->
  <g fill="#fff" opacity="0.85">
    <circle cx="200" cy="540" r="5"/>
    <circle cx="320" cy="540" r="5"/>
    <circle cx="440" cy="540" r="5"/>
    <circle cx="700" cy="440" r="5"/>
    <circle cx="820" cy="440" r="5"/>
    <circle cx="1100" cy="540" r="5"/>
    <circle cx="1220" cy="540" r="5"/>
    <circle cx="1500" cy="440" r="5"/>
    <circle cx="1640" cy="440" r="5"/>
  </g>

  <!-- Stage 1: Emit cluster of cards -->
  <g filter="url(#shadowPL)">
    <rect x="120" y="280" width="320" height="100" rx="12" fill="url(#cardEmit)"/>
    <text x="280" y="315" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">A2A agent pods</text>
    <text x="280" y="345" text-anchor="middle" font-size="13" fill="#f3d4ee" font-family="'JetBrains Mono',monospace">LangChain · Claude · custom</text>
    <text x="280" y="365" text-anchor="middle" font-size="12" fill="#f3d4ee">auto-instrumented</text>
  </g>
  <g filter="url(#shadowPL)">
    <rect x="120" y="600" width="320" height="80" rx="12" fill="url(#cardEmit)"/>
    <text x="280" y="635" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">MCP tool pods</text>
    <text x="280" y="660" text-anchor="middle" font-size="13" fill="#f3d4ee">stdio / HTTP servers</text>
  </g>
  <g filter="url(#shadowPL)">
    <rect x="120" y="720" width="320" height="80" rx="12" fill="url(#cardEmit)"/>
    <text x="280" y="755" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">Kagenti Backend</text>
    <text x="280" y="780" text-anchor="middle" font-size="13" fill="#f3d4ee">FastAPI app traces</text>
  </g>

  <!-- emit env var chip -->
  <g>
    <rect x="120" y="830" width="320" height="78" rx="10" fill="#fff" stroke="#cfd8e2"/>
    <text x="138" y="858" font-size="13" fill="#4a6275">Kagenti injects:</text>
    <text x="138" y="884" font-size="14" font-family="'JetBrains Mono',monospace" fill="#7a2c75">OTEL_EXPORTER_OTLP_</text>
    <text x="138" y="902" font-size="14" font-family="'JetBrains Mono',monospace" fill="#7a2c75">ENDPOINT=…:8335</text>
  </g>

  <!-- short connectors from emit cards into ribbon -->
  <g stroke="#7a2c75" stroke-width="2" fill="none" stroke-dasharray="4 3">
    <path d="M280,380 L280,520"/>
    <path d="M280,600 L280,560"/>
    <path d="M280,720 L320,560"/>
  </g>

  <!-- Stage 2: Collect (service + pod + configmap) -->
  <g filter="url(#shadowPL)">
    <rect x="600" y="270" width="380" height="160" rx="14" fill="url(#cardCollect)"/>
    <text x="790" y="315" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">otel-collector</text>
    <text x="790" y="345" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#bfe2f0">Service · :8335 OTLP/gRPC</text>
    <line x1="640" y1="365" x2="940" y2="365" stroke="#7fb6e6" stroke-opacity="0.5"/>
    <text x="790" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Pod</text>
    <text x="790" y="414" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#bfe2f0">otel/opentelemetry-collector-contrib:0.122.1</text>
  </g>
  <g filter="url(#shadowPL)">
    <rect x="600" y="630" width="380" height="80" rx="10" fill="#0e4c6c" stroke="#2f8fbf" stroke-dasharray="6 4"/>
    <text x="790" y="665" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">otel-collector-config</text>
    <text x="790" y="690" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#bfe2f0">ConfigMap · receivers · processors · exporters</text>
  </g>
  <g stroke="#0e4c6c" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arrowPL)">
    <path d="M790,630 L790,440"/>
  </g>
  <text x="800" y="540" font-size="12" fill="#0e4c6c" font-family="'JetBrains Mono',monospace">mounted</text>

  <!-- Stage 3: Store (postgres cylinder) -->
  <g filter="url(#shadowPL)">
    <g transform="translate(1080,270)">
      <ellipse cx="160" cy="14" rx="160" ry="14" fill="#5fc28d"/>
      <rect x="0" y="14" width="320" height="160" fill="url(#cardStore)"/>
      <ellipse cx="160" cy="174" rx="160" ry="14" fill="#0e4226"/>
      <text x="160" y="92" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">postgres-otel</text>
      <text x="160" y="120" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#dff5e7">spans · attributes · resources</text>
      <text x="160" y="148" text-anchor="middle" font-size="12" fill="#dff5e7">PVC-backed</text>
    </g>
  </g>

  <!-- Stage 4: View (mlflow UI mock) -->
  <g filter="url(#shadowPL)">
    <rect x="1520" y="270" width="320" height="220" rx="14" fill="url(#cardView)"/>
    <rect x="1520" y="270" width="320" height="36" rx="14" fill="#a04a14"/>
    <circle cx="1538" cy="288" r="5" fill="#ffd9b8"/>
    <circle cx="1554" cy="288" r="5" fill="#ffd9b8"/>
    <circle cx="1570" cy="288" r="5" fill="#ffd9b8"/>
    <text x="1820" y="293" text-anchor="end" font-size="11" font-family="'JetBrains Mono',monospace" fill="#ffe2cd">mlflow.localtest.me</text>

    <!-- fake trace bars -->
    <g transform="translate(1540,330)">
      <rect width="280" height="14" rx="3" fill="#ffd9b8"/>
      <rect y="22" x="20" width="240" height="10" rx="3" fill="#ffe2cd"/>
      <rect y="40" x="40" width="200" height="10" rx="3" fill="#ffe2cd"/>
      <rect y="58" x="60" width="160" height="10" rx="3" fill="#ffe2cd"/>
      <rect y="76" x="80" width="120" height="10" rx="3" fill="#ffe2cd"/>
      <rect y="94" x="40" width="180" height="10" rx="3" fill="#ffe2cd"/>
      <rect y="112" x="20" width="220" height="10" rx="3" fill="#ffe2cd"/>
    </g>
    <text x="1680" y="475" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">mlflow</text>
  </g>
  <g>
    <rect x="1520" y="510" width="320" height="56" rx="10" fill="#fff" stroke="#cfd8e2"/>
    <text x="1680" y="534" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#c25a18">http://mlflow:5000</text>
    <text x="1680" y="554" text-anchor="middle" font-size="13" font-family="'JetBrains Mono',monospace" fill="#c25a18">/v1/traces  ·  gRPC plaintext</text>
  </g>

  <!-- Stage badges sitting on ribbon -->
  <g>
    <circle cx="520" cy="540" r="22" fill="#7a2c75" stroke="#fff" stroke-width="3"/>
    <text x="520" y="546" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">1</text>
    <circle cx="920" cy="440" r="22" fill="#0e4c6c" stroke="#fff" stroke-width="3"/>
    <text x="920" y="446" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">2</text>
    <circle cx="1320" cy="540" r="22" fill="#1f7a4d" stroke="#fff" stroke-width="3"/>
    <text x="1320" y="546" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">3</text>
    <circle cx="1820" cy="440" r="22" fill="#c25a18" stroke="#fff" stroke-width="3"/>
    <text x="1820" y="446" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">4</text>
  </g>

  <!-- protocol callouts under ribbon -->
  <g font-size="13" font-family="'JetBrains Mono',monospace" fill="#0e2433">
    <text x="320" y="600" text-anchor="middle">OTLP/gRPC</text>
    <text x="780" y="500" text-anchor="middle">batch · attributes</text>
    <text x="1180" y="600" text-anchor="middle">SQL writes</text>
    <text x="1640" y="500" text-anchor="middle">REST query</text>
  </g>

  <!-- footer caption -->
  <g>
    <rect x="120" y="930" width="1680" height="120" rx="12" fill="#fff" stroke="#cfd8e2"/>
    <text x="146" y="970" font-size="18" fill="#0e2433">Kagenti provides the observability <tspan font-weight="700">configuration</tspan> — every box on this slide is an <tspan font-weight="700">open source component</tspan>.</text>
    <text x="146" y="1000" font-size="18" fill="#0e2433">Workloads are auto-injected with <tspan font-family="'JetBrains Mono',monospace" font-weight="700">OTEL_EXPORTER_OTLP_ENDPOINT</tspan>; LangChain and Claude already emit OTLP spans without code changes.</text>
    <text x="146" y="1030" font-size="15" fill="#4a6275" font-style="italic">Stage colors flow left → right: emit (purple) · collect (blue) · store (green) · view (orange).</text>
  </g>
</svg>
