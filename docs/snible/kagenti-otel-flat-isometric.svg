<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg-fi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="100%" stop-color="#e6ecf3"/>
    </linearGradient>
    <linearGradient id="pod-fi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b14fa8"/>
      <stop offset="100%" stop-color="#7a2c75"/>
    </linearGradient>
    <linearGradient id="podBack-fi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a2c75"/>
      <stop offset="100%" stop-color="#5a1f56"/>
    </linearGradient>
    <linearGradient id="svc-fi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f8fbf"/>
      <stop offset="100%" stop-color="#156082"/>
    </linearGradient>
    <linearGradient id="collector-fi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3aa372"/>
      <stop offset="100%" stop-color="#1f7a4d"/>
    </linearGradient>
    <linearGradient id="mlflow-fi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f08a3a"/>
      <stop offset="100%" stop-color="#c25a18"/>
    </linearGradient>
    <linearGradient id="cm-fi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fb0d4"/>
      <stop offset="100%" stop-color="#2c6f8e"/>
    </linearGradient>
    <filter id="shadow-fi" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-fi" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#2c4257"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg-fi)"/>

  <!-- Title -->
  <text x="960" y="70" text-anchor="middle" font-size="42" font-weight="700" fill="#0e2433">What does the Kagenti platform provide?</text>
  <text x="960" y="108" text-anchor="middle" font-size="20" fill="#4a6275">OpenTelemetry pipeline — emit · collect · store · view</text>

  <!-- LEFT: workloads -->
  <g font-size="16" fill="#fff">
    <text x="240" y="180" text-anchor="middle" font-size="22" font-weight="600" fill="#0e2433">Workloads</text>

    <!-- A2A agent stack (isometric) -->
    <g filter="url(#shadow-fi)">
      <g transform="translate(120,250)">
        <!-- back -->
        <rect x="40" y="-20" width="280" height="80" rx="10" fill="url(#podBack-fi)"/>
        <rect x="20" y="0" width="280" height="80" rx="10" fill="url(#podBack-fi)" opacity="0.85"/>
        <rect x="0" y="20" width="280" height="80" rx="10" fill="url(#pod-fi)"/>
        <text x="140" y="68" text-anchor="middle" font-size="20" font-weight="600">A2A agent pods</text>
      </g>
    </g>

    <!-- MCP tool stack -->
    <g filter="url(#shadow-fi)">
      <g transform="translate(120,430)">
        <rect x="40" y="-20" width="280" height="80" rx="10" fill="url(#podBack-fi)"/>
        <rect x="20" y="0" width="280" height="80" rx="10" fill="url(#podBack-fi)" opacity="0.85"/>
        <rect x="0" y="20" width="280" height="80" rx="10" fill="url(#pod-fi)"/>
        <text x="140" y="68" text-anchor="middle" font-size="20" font-weight="600">MCP tool pods</text>
      </g>
    </g>

    <!-- Kagenti backend -->
    <g filter="url(#shadow-fi)">
      <rect x="120" y="610" width="280" height="90" rx="12" fill="url(#collector-fi)"/>
      <text x="260" y="660" text-anchor="middle" font-size="20" font-weight="600">Kagenti Backend</text>
    </g>

    <!-- env var caption -->
    <g font-style="italic" fill="#2c4257" font-size="15">
      <rect x="80" y="740" width="360" height="78" rx="8" fill="#ffffff" stroke="#cfd8e2"/>
      <text x="100" y="772">Workloads receive:</text>
      <text x="100" y="800" font-family="'JetBrains Mono','Menlo',monospace" font-size="14" fill="#7a2c75">OTEL_EXPORTER_OTLP_ENDPOINT=…</text>
    </g>
  </g>

  <!-- arrows from workloads to MCP gateway/service -->
  <g stroke="#2c4257" stroke-width="2.5" fill="none" marker-end="url(#arrow-fi)">
    <path d="M400,290 C500,290 540,420 640,470"/>
    <path d="M400,470 C500,470 560,470 640,470"/>
    <path d="M400,650 C500,650 560,540 640,520"/>
  </g>

  <!-- CENTER: MCP gateway + collector service + collector pod -->
  <!-- MCP Gateway -->
  <g filter="url(#shadow-fi)">
    <rect x="640" y="430" width="220" height="100" rx="12" fill="url(#collector-fi)"/>
    <text x="750" y="475" text-anchor="middle" font-size="18" font-weight="600" fill="#fff">MCP Gateway</text>
    <text x="750" y="505" text-anchor="middle" font-size="13" fill="#dff5e7">L7 entry</text>
  </g>

  <!-- Cluster boundary -->
  <g>
    <rect x="540" y="200" width="940" height="540" rx="20" fill="none" stroke="#2c4257" stroke-dasharray="6 6" stroke-width="2"/>
    <text x="560" y="226" font-size="16" fill="#2c4257" font-weight="600">kagenti-system namespace</text>
  </g>

  <!-- Collector Service (DB-cylinder-free, just rounded with port chip) -->
  <g filter="url(#shadow-fi)">
    <rect x="900" y="260" width="540" height="120" rx="14" fill="url(#svc-fi)"/>
    <text x="1170" y="305" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">otel-collector</text>
    <text x="1170" y="338" text-anchor="middle" font-size="15" fill="#cfe8f5">Service · kagenti-system.svc.cluster.local</text>
    <g>
      <rect x="1080" y="350" width="180" height="22" rx="11" fill="#0a3a52"/>
      <text x="1170" y="367" text-anchor="middle" font-size="13" fill="#9ed6f0" font-family="'JetBrains Mono',monospace">:8335 OTLP</text>
    </g>
  </g>

  <!-- arrow service -> pod -->
  <g stroke="#2c4257" stroke-width="2.5" fill="none" marker-end="url(#arrow-fi)">
    <path d="M1170,380 L1170,430"/>
  </g>

  <!-- Collector Pod (isometric box) -->
  <g filter="url(#shadow-fi)">
    <g transform="translate(900,430)">
      <!-- top -->
      <polygon points="0,40 270,40 320,0 50,0" fill="#5fc28d"/>
      <!-- left -->
      <polygon points="0,40 0,170 270,170 270,40" fill="url(#collector-fi)"/>
      <!-- right -->
      <polygon points="270,40 320,0 320,130 270,170" fill="#1f7a4d"/>
      <text x="135" y="95" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">otel/opentelemetry-</text>
      <text x="135" y="120" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">collector-contrib</text>
      <text x="135" y="148" text-anchor="middle" font-size="14" fill="#dff5e7" font-family="'JetBrains Mono',monospace">:0.122.1</text>
    </g>
  </g>

  <!-- ConfigMap mounted into collector -->
  <g filter="url(#shadow-fi)">
    <g transform="translate(900,650)">
      <ellipse cx="135" cy="14" rx="135" ry="14" fill="#86c7e3"/>
      <rect x="0" y="14" width="270" height="50" fill="url(#cm-fi)"/>
      <ellipse cx="135" cy="64" rx="135" ry="14" fill="#1d5570"/>
      <text x="135" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">otel-collector-config (ConfigMap)</text>
    </g>
  </g>
  <g stroke="#2c4257" stroke-width="2" stroke-dasharray="5 4" fill="none">
    <path d="M1035,650 L1035,600"/>
    <text x="1045" y="630" font-size="12" fill="#2c4257">mounts</text>
  </g>

  <!-- RIGHT: exporters -->
  <g>
    <text x="1700" y="180" text-anchor="middle" font-size="22" font-weight="600" fill="#0e2433">Exporters</text>

    <!-- mlflow box -->
    <g filter="url(#shadow-fi)">
      <rect x="1530" y="240" width="340" height="120" rx="14" fill="url(#mlflow-fi)"/>
      <text x="1700" y="285" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">mlflow</text>
      <text x="1700" y="318" text-anchor="middle" font-size="14" font-family="'JetBrains Mono',monospace" fill="#fff">http://mlflow:5000</text>
      <text x="1700" y="342" text-anchor="middle" font-size="14" font-family="'JetBrains Mono',monospace" fill="#ffe2cd">/v1/traces</text>
    </g>

    <!-- postgres-otel cylinder -->
    <g filter="url(#shadow-fi)">
      <g transform="translate(1530,440)">
        <ellipse cx="170" cy="14" rx="170" ry="14" fill="#86c7e3"/>
        <rect x="0" y="14" width="340" height="120" fill="url(#svc-fi)"/>
        <ellipse cx="170" cy="134" rx="170" ry="14" fill="#0a3a52"/>
        <text x="170" y="80" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">postgres-otel</text>
        <text x="170" y="108" text-anchor="middle" font-size="14" fill="#cfe8f5">PVC-backed</text>
      </g>
    </g>

    <!-- postgres service chip -->
    <g filter="url(#shadow-fi)">
      <rect x="1530" y="610" width="340" height="60" rx="10" fill="url(#svc-fi)"/>
      <text x="1700" y="648" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">postgres-otel (Service)</text>
    </g>

    <!-- pvc chip -->
    <g>
      <rect x="1610" y="700" width="180" height="36" rx="8" fill="#fff" stroke="#2c4257"/>
      <text x="1700" y="725" text-anchor="middle" font-size="14" fill="#2c4257">pv / pvc</text>
    </g>
  </g>

  <!-- arrow collector -> mlflow with protocol label -->
  <g stroke="#2c4257" stroke-width="2.5" fill="none" marker-end="url(#arrow-fi)">
    <path d="M1220,490 C1380,490 1430,300 1530,300"/>
  </g>
  <g font-size="13" fill="#2c4257">
    <rect x="1320" y="378" width="120" height="44" rx="6" fill="#fff" stroke="#cfd8e2"/>
    <text x="1380" y="396" text-anchor="middle">gRPC</text>
    <text x="1380" y="412" text-anchor="middle">plaintext</text>
  </g>

  <!-- arrow collector -> postgres -->
  <g stroke="#2c4257" stroke-width="2.5" fill="none" marker-end="url(#arrow-fi)">
    <path d="M1220,560 C1380,560 1430,500 1530,500"/>
  </g>

  <!-- arrow postgres svc -> pvc (down) -->
  <g stroke="#2c4257" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-fi)">
    <path d="M1700,670 L1700,700"/>
  </g>

  <!-- footer caption -->
  <g>
    <rect x="180" y="950" width="1560" height="100" rx="10" fill="#ffffff" stroke="#cfd8e2"/>
    <text x="210" y="990" font-size="18" fill="#0e2433">The Kagenti platform provides Observability configuration; 100% of the implementation is <tspan font-weight="700">open source components</tspan>.</text>
    <text x="210" y="1022" font-size="18" fill="#0e2433"><tspan font-weight="700">LangChain</tspan> and even <tspan font-weight="700">Claude</tspan> are already instrumented to write OpenTelemetry packets to the collector.</text>
  </g>
</svg>
