<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 700" font-family="RedHatText, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .card-bg { fill: #ffffff; stroke: #d2d2d2; stroke-width: 1; }
      .card-header { fill: #151515; font-size: 16px; font-weight: 700; }
      .label-text { fill: #151515; font-size: 13px; }
      .label-bold { fill: #151515; font-size: 13px; font-weight: 700; }
      .desc-text { fill: #6a6e73; font-size: 11px; }
      .checkbox-box { fill: #0066cc; stroke: #0066cc; stroke-width: 1.5; }
      .checkbox-unchecked { fill: #ffffff; stroke: #d2d2d2; stroke-width: 1.5; }
      .checkmark { fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .radio-outer { fill: #ffffff; stroke: #0066cc; stroke-width: 1.5; }
      .radio-inner { fill: #0066cc; }
      .radio-outer-off { fill: #ffffff; stroke: #8a8d90; stroke-width: 1.5; }
      .section-header { fill: #151515; font-size: 13px; font-weight: 600; }
      .input-box { fill: #ffffff; stroke: #d2d2d2; stroke-width: 1; }
      .input-placeholder { fill: #6a6e73; font-size: 12px; font-style: italic; }
      .form-label { fill: #151515; font-size: 12px; font-weight: 600; }
      .helper-text { fill: #6a6e73; font-size: 11px; }
      .separator { stroke: #d2d2d2; stroke-width: 1; }
      .grid-header { fill: #6a6e73; font-size: 11px; font-weight: 600; text-transform: uppercase; }
      .grid-cell { fill: #151515; font-size: 12px; font-family: 'Red Hat Mono', monospace; }
      .grid-cell-placeholder { fill: #8a8d90; font-size: 12px; font-style: italic; font-family: 'Red Hat Mono', monospace; }
      .table-bg { fill: #fafafa; stroke: #d2d2d2; stroke-width: 1; }
      .row-sep { stroke: #ebebeb; stroke-width: 1; }
      .btn-danger { fill: #ffffff; stroke: #c9190b; stroke-width: 1; }
      .btn-danger-text { fill: #c9190b; font-size: 11px; font-weight: 600; }
      .btn-primary { fill: #0066cc; }
      .btn-primary-text { fill: #ffffff; font-size: 11px; font-weight: 600; }
      .scope-chip { fill: #f0f0f0; stroke: #d2d2d2; stroke-width: 1; }
      .scope-chip-text { fill: #151515; font-size: 10px; font-family: 'Red Hat Mono', monospace; }
    </style>
  </defs>

  <!-- Card background -->
  <rect class="card-bg" x="10" y="10" width="760" height="680" rx="4"/>

  <!-- Card header -->
  <text class="card-header" x="30" y="42">Security</text>
  <line class="separator" x1="10" y1="55" x2="770" y2="55"/>

  <!-- AuthBridge checkbox (checked) -->
  <rect class="checkbox-box" x="30" y="72" width="16" height="16" rx="2"/>
  <polyline class="checkmark" points="33,80 37,84 43,76"/>
  <text class="label-bold" x="54" y="85">Secure with AuthBridge</text>
  <text class="desc-text" x="54" y="100">When enabled, the agent will reject inbound A2A without a valid JWT.</text>

  <!-- Sandbox networking sub-checkbox (checked, indented) -->
  <rect class="checkbox-box" x="60" y="118" width="16" height="16" rx="2"/>
  <polyline class="checkmark" points="63,126 67,130 73,122"/>
  <text class="label-text" x="84" y="131">Sandbox networking with Envoy proxy</text>

  <!-- SPIRE checkbox (checked) -->
  <rect class="checkbox-box" x="30" y="158" width="16" height="16" rx="2"/>
  <polyline class="checkmark" points="33,166 37,170 43,162"/>
  <text class="label-bold" x="54" y="171">Secure with SPIRE identity</text>

  <line class="separator" x1="30" y1="195" x2="750" y2="195"/>

  <!-- Disable inbound security on ports -->
  <text class="form-label" x="30" y="220">Disable inbound security on ports</text>
  <rect class="input-box" x="30" y="232" width="500" height="32" rx="3"/>
  <text class="input-placeholder" x="42" y="252">e.g. 9090, 8081</text>
  <text class="helper-text" x="30" y="280">Comma-separated TCP ports.</text>

  <line class="separator" x1="30" y1="300" x2="750" y2="300"/>

  <!-- Outbound radio: selected -->
  <circle class="radio-outer" cx="38" cy="328" r="8"/>
  <circle class="radio-inner" cx="38" cy="328" r="4"/>
  <text class="label-bold" x="54" y="332">Outbound Authorization header control</text>
  <text class="desc-text" x="54" y="348">RFC 8693 / OAuth 2.0 Token Exchange — restrict outbound to certain hosts</text>
  <text class="desc-text" x="54" y="361">and OIDC audiences and scopes.</text>

  <!-- Table -->
  <rect class="table-bg" x="54" y="378" width="696" height="108" rx="3"/>

  <!-- Table header -->
  <text class="grid-header" x="68" y="397">HOST PATTERN</text>
  <text class="grid-header" x="260" y="397">TARGET OIDC AUDIENCE</text>
  <text class="grid-header" x="450" y="397">OIDC TOKEN SCOPES</text>
  <line class="row-sep" x1="54" y1="406" x2="750" y2="406"/>

  <!-- Row 1: existing rule -->
  <text class="grid-cell" x="68" y="427">github-tool-mcp</text>
  <text class="grid-cell" x="260" y="427">github-tool</text>
  <rect class="scope-chip" x="450" y="416" width="48" height="16" rx="8"/>
  <text class="scope-chip-text" x="458" y="427">scope1</text>
  <rect class="scope-chip" x="504" y="416" width="48" height="16" rx="8"/>
  <text class="scope-chip-text" x="512" y="427">scope2</text>
  <!-- Delete button -->
  <rect class="btn-danger" x="668" y="416" width="64" height="22" rx="3"/>
  <text class="btn-danger-text" x="680" y="431">Delete</text>

  <line class="row-sep" x1="54" y1="446" x2="750" y2="446"/>

  <!-- Row 2: add row (placeholders) -->
  <rect class="input-box" x="64" y="454" width="180" height="24" rx="3"/>
  <text class="grid-cell-placeholder" x="72" y="471">e.g. github-tool-mcp</text>

  <rect class="input-box" x="256" y="454" width="180" height="24" rx="3"/>
  <text class="grid-cell-placeholder" x="264" y="471">e.g. github-tool</text>

  <rect class="input-box" x="448" y="454" width="200" height="24" rx="3"/>
  <text class="grid-cell-placeholder" x="456" y="471">scope1 scope2</text>

  <!-- Add button -->
  <rect class="btn-primary" x="668" y="454" width="64" height="24" rx="3"/>
  <text class="btn-primary-text" x="685" y="470">Add</text>

  <!-- Outbound radio: not selected -->
  <circle class="radio-outer-off" cx="38" cy="514" r="8"/>
  <text class="label-text" x="54" y="518">No outbound token restriction</text>

  <line class="separator" x1="30" y1="540" x2="750" y2="540"/>

  <!-- Disable outbound security on ports -->
  <text class="form-label" x="30" y="565">Disable outbound security on ports</text>
  <rect class="input-box" x="30" y="577" width="500" height="32" rx="3"/>
  <text class="input-placeholder" x="42" y="597">e.g. 5432, 6379</text>
  <text class="helper-text" x="30" y="625">Comma-separated TCP ports.</text>
</svg>
