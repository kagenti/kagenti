<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 920" font-family="RedHatText, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <style>
      .card-bg { fill: #ffffff; stroke: #d2d2d2; stroke-width: 1; }
      .card-header { fill: #151515; font-size: 16px; font-weight: 700; }
      .label-text { fill: #151515; font-size: 13px; }
      .desc-text { fill: #6a6e73; font-size: 11px; }
      .id-text { fill: #0066cc; font-size: 11px; font-family: 'Red Hat Mono', monospace; }
      .checkbox-box { fill: #0066cc; stroke: #0066cc; stroke-width: 1.5; rx: 2; }
      .checkbox-unchecked { fill: #ffffff; stroke: #d2d2d2; stroke-width: 1.5; rx: 2; }
      .checkmark { fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .section-header { fill: #151515; font-size: 13px; font-weight: 600; }
      .input-box { fill: #ffffff; stroke: #d2d2d2; stroke-width: 1; rx: 3; }
      .input-placeholder { fill: #6a6e73; font-size: 12px; }
      .alert-bg { fill: #e7f1fa; stroke: #73bcf7; stroke-width: 1; rx: 4; }
      .alert-title { fill: #002952; font-size: 12px; font-weight: 600; }
      .alert-text { fill: #151515; font-size: 11px; }
      .code-text { fill: #151515; font-size: 11px; font-family: 'Red Hat Mono', monospace; background: #f0f0f0; }
      .btn-link { fill: #0066cc; font-size: 12px; }
      .btn-plain { fill: #6a6e73; font-size: 12px; }
      .expand-toggle { fill: #151515; font-size: 13px; cursor: pointer; }
      .select-box { fill: #ffffff; stroke: #d2d2d2; stroke-width: 1; rx: 3; }
      .form-label { fill: #151515; font-size: 12px; font-weight: 600; }
      .helper-text { fill: #6a6e73; font-size: 11px; }
      .separator { stroke: #d2d2d2; stroke-width: 1; }
      .grid-header { fill: #6a6e73; font-size: 11px; font-weight: 600; }
    </style>
  </defs>

  <!-- Card background -->
  <rect class="card-bg" x="10" y="10" width="760" height="900" rx="4"/>

  <!-- Card header -->
  <text class="card-header" x="30" y="42">Agent Configuration</text>
  <line class="separator" x1="10" y1="55" x2="770" y2="55"/>

  <!-- authBridgeEnabled checkbox -->
  <rect class="checkbox-box" x="30" y="72" width="16" height="16"/>
  <polyline class="checkmark" points="33,80 37,84 43,76"/>
  <text class="label-text" x="54" y="85">Enable AuthBridge sidecar injection</text>
  <text class="id-text" x="580" y="85">id="authBridgeEnabled"</text>
  <text class="desc-text" x="54" y="100">When enabled, the webhook injects AuthBridge for inbound JWT validation,</text>
  <text class="desc-text" x="54" y="113">outbound token exchange, and Keycloak client registration.</text>

  <!-- Info alert -->
  <rect class="alert-bg" x="30" y="125" width="720" height="52"/>
  <circle cx="47" cy="144" r="8" fill="#73bcf7"/>
  <text fill="#ffffff" x="44" y="148" font-size="11" font-weight="700">i</text>
  <text class="alert-title" x="62" y="148">Combined AuthBridge container</text>
  <text class="alert-text" x="62" y="164">There is no toggle here for single-container mode. When featureGates.combinedSidecar is true</text>
  <text class="alert-text" x="62" y="176">on the admission webhook, injected pods get one authbridge container.</text>

  <!-- spireEnabled checkbox -->
  <rect class="checkbox-box" x="30" y="192" width="16" height="16"/>
  <polyline class="checkmark" points="33,200 37,204 43,196"/>
  <text class="label-text" x="54" y="205">Enable SPIRE identity (spiffe-helper sidecar)</text>
  <text class="id-text" x="580" y="205">id="spireEnabled"</text>

  <!-- Advanced Injection Controls section -->
  <text class="section-header" x="30" y="236">Advanced Injection Controls</text>
  <line class="separator" x1="30" y1="242" x2="750" y2="242" stroke-dasharray="4,2"/>

  <!-- envoyProxyInject -->
  <rect class="checkbox-box" x="44" y="255" width="16" height="16"/>
  <polyline class="checkmark" points="47,263 51,267 57,259"/>
  <text class="label-text" x="68" y="268">Envoy Proxy</text>
  <text class="id-text" x="580" y="268">id="envoyProxyInject"</text>
  <text class="desc-text" x="68" y="283">Envoy proxy with go-processor for traffic interception. Disable to skip envoy-proxy sidecar.</text>

  <!-- spiffeHelperInject -->
  <rect class="checkbox-box" x="44" y="298" width="16" height="16"/>
  <polyline class="checkmark" points="47,306 51,310 57,302"/>
  <text class="label-text" x="68" y="311">SPIFFE Helper</text>
  <text class="id-text" x="580" y="311">id="spiffeHelperInject"</text>
  <text class="desc-text" x="68" y="326">SPIFFE identity helper for SVID management. Disable to skip spiffe-helper sidecar.</text>

  <!-- clientRegistrationInject -->
  <rect class="checkbox-box" x="44" y="341" width="16" height="16"/>
  <polyline class="checkmark" points="47,349 51,353 57,345"/>
  <text class="label-text" x="68" y="354">Client Registration</text>
  <text class="id-text" x="580" y="354">id="clientRegistrationInject"</text>
  <text class="desc-text" x="68" y="369">Sidecar-based Keycloak client registration. Automatically registers the workload as an</text>
  <text class="desc-text" x="68" y="382">OAuth2 client using its SPIFFE identity.</text>

  <!-- Outbound Routing Rules expandable section -->
  <text class="expand-toggle" x="30" y="414">&#9662; Outbound Routing Rules (1 route)</text>

  <!-- Route grid header -->
  <text class="grid-header" x="44" y="438">Host pattern</text>
  <text class="grid-header" x="230" y="438">Target audience</text>
  <text class="grid-header" x="430" y="438">Token scopes</text>

  <!-- Route row -->
  <rect class="input-box" x="44" y="445" width="170" height="30"/>
  <text class="input-placeholder" x="52" y="464">e.g. github-tool-mcp</text>
  <text class="id-text" x="44" y="490">aria-label="Host pattern"</text>

  <rect class="input-box" x="224" y="445" width="190" height="30"/>
  <text class="input-placeholder" x="232" y="464">e.g. github-tool</text>
  <text class="id-text" x="224" y="490">aria-label="Target audience"</text>

  <rect class="input-box" x="424" y="445" width="210" height="30"/>
  <text class="input-placeholder" x="432" y="464">openid scope1 scope2</text>
  <text class="id-text" x="424" y="490">aria-label="Token scopes"</text>

  <text class="btn-plain" x="650" y="464">Remove</text>

  <!-- Add Route button -->
  <text class="btn-link" x="44" y="515">+ Add Route</text>

  <!-- AuthBridge Advanced Configuration expandable section -->
  <text class="expand-toggle" x="30" y="550">&#9662; AuthBridge Advanced Configuration</text>

  <!-- Outbound Ports to Exclude -->
  <text class="form-label" x="44" y="580">Outbound Ports to Exclude</text>
  <rect class="input-box" x="44" y="588" width="400" height="30"/>
  <text class="input-placeholder" x="52" y="607">e.g. 11434,443</text>
  <text class="id-text" x="460" y="607">id="outboundPortsExclude"</text>
  <text class="helper-text" x="44" y="632">Comma-separated ports to bypass outbound proxy interception.</text>

  <!-- Inbound Ports to Exclude -->
  <text class="form-label" x="44" y="660">Inbound Ports to Exclude</text>
  <rect class="input-box" x="44" y="668" width="400" height="30"/>
  <text class="input-placeholder" x="52" y="687">e.g. 9090</text>
  <text class="id-text" x="460" y="687">id="inboundPortsExclude"</text>
  <text class="helper-text" x="44" y="712">Comma-separated ports to bypass inbound proxy interception.</text>

  <!-- Default Outbound Policy -->
  <text class="form-label" x="44" y="740">Default Outbound Policy</text>
  <rect class="select-box" x="44" y="748" width="400" height="30"/>
  <text class="label-text" x="52" y="767">passthrough -- pass traffic through unchanged (default)</text>
  <!-- dropdown arrow -->
  <polygon points="428,760 436,760 432,768" fill="#6a6e73"/>
  <text class="id-text" x="460" y="767">id="defaultOutboundPolicy"</text>
  <text class="helper-text" x="44" y="792">Options: "passthrough" | "exchange"</text>

  <!-- Legend -->
  <rect x="30" y="830" width="720" height="70" fill="#f0f0f0" rx="4" stroke="#d2d2d2"/>
  <text class="section-header" x="44" y="852">Legend</text>
  <rect class="checkbox-box" x="44" y="860" width="12" height="12"/>
  <polyline points="47,866 49,868 53,863" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <text class="desc-text" x="62" y="870">= Checked checkbox</text>
  <text class="id-text" x="200" y="870">Blue monospace text = React element identifier</text>
  <text class="desc-text" x="500" y="870">Grey text = description / helper text</text>
  <text class="desc-text" x="44" y="888">All fields shown are conditionally visible: they only appear when authBridgeEnabled is checked.</text>
</svg>
