<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="'Red Hat Mono', 'SF Mono', Consolas, monospace">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .card { fill: #fafafa; stroke: #d2d2d2; stroke-width: 1; rx: 6; }
      .title { fill: #151515; font-size: 14px; font-weight: 700; font-family: RedHatText, sans-serif; }
      .subtitle { fill: #6a6e73; font-size: 11px; font-family: RedHatText, sans-serif; }
      .key { fill: #151515; font-size: 12px; font-weight: 600; }
      .value-id { fill: #0066cc; font-size: 12px; }
      .comment { fill: #6a6e73; font-size: 11px; font-style: italic; }
      .brace { fill: #c9190b; font-size: 13px; font-weight: 700; }
      .endpoint { fill: #3e8635; font-size: 12px; font-weight: 600; }
      .type-hint { fill: #8a8d90; font-size: 10px; }
      .indent { fill: #151515; font-size: 12px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="780" height="520"/>

  <!-- Title -->
  <text class="title" x="20" y="30" font-family="RedHatText, sans-serif">API Request Payload — React IDs as Values</text>
  <text class="subtitle" x="20" y="46">Keys are actual API field names. Values show the React id that supplies them.</text>

  <!-- Endpoint -->
  <text class="endpoint" x="20" y="72">POST /api/v1/agents</text>
  <text class="comment" x="220" y="72">// AuthBridge-relevant fields only</text>

  <!-- Card background -->
  <rect class="card" x="20" y="85" width="740" height="420"/>

  <!-- JSON content -->
  <text class="brace" x="32" y="112">{</text>

  <!-- authBridgeEnabled -->
  <text class="key" x="52" y="138">"authBridgeEnabled":</text>
  <text class="value-id" x="240" y="138">authBridgeEnabled</text>
  <text class="type-hint" x="500" y="138">// boolean from checkbox</text>

  <!-- spireEnabled -->
  <text class="key" x="52" y="162">"spireEnabled":</text>
  <text class="value-id" x="240" y="162">spireEnabled</text>
  <text class="type-hint" x="500" y="162">// boolean from checkbox</text>

  <!-- envoyProxyInject -->
  <text class="key" x="52" y="186">"envoyProxyInject":</text>
  <text class="value-id" x="240" y="186">envoyProxyInject</text>
  <text class="type-hint" x="500" y="186">// boolean | undefined</text>

  <!-- spiffeHelperInject -->
  <text class="key" x="52" y="210">"spiffeHelperInject":</text>
  <text class="value-id" x="240" y="210">spiffeHelperInject</text>
  <text class="type-hint" x="500" y="210">// boolean | undefined</text>

  <!-- clientRegistrationInject -->
  <text class="key" x="52" y="234">"clientRegistrationInject":</text>
  <text class="value-id" x="240" y="234">clientRegistrationInject</text>
  <text class="type-hint" x="500" y="234">// boolean | undefined</text>

  <!-- outboundRoutes array -->
  <text class="key" x="52" y="270">"outboundRoutes": [</text>
  <text class="brace" x="72" y="292">{</text>
  <text class="key" x="92" y="314">"host":</text>
  <text class="value-id" x="170" y="314">aria-label="Host pattern"</text>
  <text class="type-hint" x="500" y="314">// string from TextInput</text>
  <text class="key" x="92" y="336">"target_audience":</text>
  <text class="value-id" x="240" y="336">aria-label="Target audience"</text>
  <text class="type-hint" x="500" y="336">// string from TextInput</text>
  <text class="key" x="92" y="358">"token_scopes":</text>
  <text class="value-id" x="240" y="358">aria-label="Token scopes"</text>
  <text class="type-hint" x="500" y="358">// string from TextInput</text>
  <text class="brace" x="72" y="378">}</text>
  <text class="key" x="52" y="398">]</text>

  <!-- outboundPortsExclude -->
  <text class="key" x="52" y="426">"outboundPortsExclude":</text>
  <text class="value-id" x="260" y="426">outboundPortsExclude</text>
  <text class="type-hint" x="500" y="426">// string | null</text>

  <!-- inboundPortsExclude -->
  <text class="key" x="52" y="450">"inboundPortsExclude":</text>
  <text class="value-id" x="260" y="450">inboundPortsExclude</text>
  <text class="type-hint" x="500" y="450">// string | null</text>

  <!-- defaultOutboundPolicy -->
  <text class="key" x="52" y="474">"defaultOutboundPolicy":</text>
  <text class="value-id" x="270" y="474">defaultOutboundPolicy</text>
  <text class="type-hint" x="500" y="474">// "passthrough" | "exchange"</text>

  <text class="brace" x="32" y="498">}</text>
</svg>
