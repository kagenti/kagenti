<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a2c75"/>
      <stop offset="50%" stop-color="#156082"/>
      <stop offset="100%" stop-color="#1f7a4d"/>
    </linearGradient>
    <linearGradient id="agentEye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f8fbf"/>
      <stop offset="100%" stop-color="#0e4c6c"/>
    </linearGradient>
    <linearGradient id="humanEye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b14fa8"/>
      <stop offset="100%" stop-color="#7a2c75"/>
    </linearGradient>
    <linearGradient id="futureEye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3aa372"/>
      <stop offset="100%" stop-color="#1f7a4d"/>
    </linearGradient>
    <radialGradient id="signalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#156082" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#156082" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#ffffff"/>

  <!-- subtle background signal glow -->
  <circle cx="960" cy="540" r="640" fill="url(#signalGlow)"/>

  <!-- top accent bar -->
  <rect x="80" y="76" width="200" height="6" rx="3" fill="url(#accent)"/>
  <text x="80" y="64" font-size="14" letter-spacing="4" fill="#7a2c75" font-weight="600">OBSERVABILITY · WHY IT MATTERS</text>

  <!-- Headline -->
  <text x="80" y="160" font-size="56" font-weight="700" fill="#0e2433">
    Empowering agent developers
  </text>
  <text x="80" y="220" font-size="56" font-weight="700" fill="#0e2433">
    to <tspan fill="url(#accent)">observe</tspan> what their agents are actually doing.
  </text>

  <!-- Three-pane progression: today → core idea → tomorrow -->

  <!-- Pane 1: NOT just performance -->
  <g transform="translate(80,300)">
    <rect width="540" height="430" rx="14" fill="#fbfafd" stroke="#e6dde7"/>
    <text x="30" y="44" font-size="14" letter-spacing="3" fill="#7a2c75" font-weight="700">NOT JUST</text>
    <text x="30" y="92" font-size="32" font-weight="700" fill="#0e2433">Performance metrics</text>

    <!-- struck-through gauges -->
    <g transform="translate(30,130)" filter="url(#softShadow)">
      <!-- response-time chip -->
      <g>
        <rect width="220" height="64" rx="10" fill="#fff" stroke="#e6dde7"/>
        <text x="20" y="28" font-size="13" fill="#7a2c75">response time</text>
        <text x="20" y="52" font-size="22" font-weight="700" fill="#0e2433" font-family="'JetBrains Mono',monospace">842ms</text>
        <line x1="14" y1="32" x2="206" y2="32" stroke="#a02b93" stroke-width="2" opacity="0.55"/>
      </g>
      <!-- token-cost chip -->
      <g transform="translate(240,0)">
        <rect width="220" height="64" rx="10" fill="#fff" stroke="#e6dde7"/>
        <text x="20" y="28" font-size="13" fill="#7a2c75">token cost</text>
        <text x="20" y="52" font-size="22" font-weight="700" fill="#0e2433" font-family="'JetBrains Mono',monospace">$0.014</text>
        <line x1="14" y1="32" x2="206" y2="32" stroke="#a02b93" stroke-width="2" opacity="0.55"/>
      </g>
    </g>

    <text x="30" y="260" font-size="20" fill="#4a6275" font-style="italic">
      Observability is not merely a
    </text>
    <text x="30" y="288" font-size="20" fill="#4a6275" font-style="italic">
      performance-engineering story
    </text>
    <text x="30" y="316" font-size="20" fill="#4a6275" font-style="italic">
      about response time and token cost.
    </text>

    <text x="30" y="380" font-size="14" letter-spacing="2" fill="#a02b93" font-weight="700">↓ THE REAL QUESTION</text>
  </g>

  <!-- Pane 2: core idea — agent under observation -->
  <g transform="translate(660,300)">
    <rect width="600" height="430" rx="14" fill="#f4f9fc" stroke="#cfe2ec"/>
    <text x="30" y="44" font-size="14" letter-spacing="3" fill="#156082" font-weight="700">THE CORE QUESTION</text>
    <text x="30" y="92" font-size="32" font-weight="700" fill="#0e2433">What is the agent</text>
    <text x="30" y="132" font-size="32" font-weight="700" fill="#0e2433">actually doing?</text>

    <!-- agent silhouette with span trace -->
    <g transform="translate(30,170)">
      <!-- the "agent" -->
      <g filter="url(#softShadow)">
        <circle cx="80" cy="90" r="56" fill="url(#agentEye)"/>
        <circle cx="80" cy="90" r="22" fill="#e6f1f7"/>
        <circle cx="80" cy="90" r="10" fill="#0e2433"/>
      </g>
      <text x="80" y="180" text-anchor="middle" font-size="13" fill="#156082" font-weight="600">running agent</text>

      <!-- trace waterfall = what the agent IS doing -->
      <g transform="translate(180,30)">
        <rect width="360" height="14" rx="3" fill="#156082"/>
        <rect x="20" y="22" width="320" height="10" rx="3" fill="#7fb6e6"/>
        <rect x="40" y="40" width="280" height="10" rx="3" fill="#7fb6e6"/>
        <rect x="60" y="58" width="220" height="10" rx="3" fill="#7fb6e6"/>
        <rect x="80" y="76" width="180" height="10" rx="3" fill="#7fb6e6"/>
        <rect x="40" y="94" width="260" height="10" rx="3" fill="#7fb6e6"/>
        <rect x="20" y="112" width="300" height="10" rx="3" fill="#7fb6e6"/>
        <text x="0" y="146" font-size="12" fill="#156082" font-family="'JetBrains Mono',monospace">tool.call · llm · retrieve · plan · act</text>
      </g>

      <!-- arrow from agent to trace -->
      <path d="M140,90 L180,90" stroke="#156082" stroke-width="2" fill="none"/>
    </g>

    <text x="30" y="386" font-size="18" fill="#0e2433">
      <tspan font-weight="600">Deep visibility</tspan> — without granting access to
    </text>
    <text x="30" y="412" font-size="18" fill="#0e2433">
      the Kagenti system or the underlying Kubernetes platform.
    </text>
  </g>

  <!-- Pane 3: 2026 → next -->
  <g transform="translate(1300,300)">
    <rect width="540" height="430" rx="14" fill="#f4faf6" stroke="#cfe6d8"/>
    <text x="30" y="44" font-size="14" letter-spacing="3" fill="#1f7a4d" font-weight="700">WHERE THIS IS GOING</text>

    <!-- 2026: human watches dashboard -->
    <g transform="translate(30,76)">
      <text font-size="14" font-weight="700" fill="#1f7a4d">2026 — humans on dashboards</text>
      <g transform="translate(0,16)" filter="url(#softShadow)">
        <rect width="480" height="100" rx="10" fill="#ffffff" stroke="#cfe6d8"/>
        <!-- mini sparkline -->
        <polyline points="20,80 60,60 100,72 140,40 180,55 220,30 260,48 300,22 340,40 380,18 420,32 460,12"
                  fill="none" stroke="#1f7a4d" stroke-width="2.5"/>
        <!-- human eye -->
        <g transform="translate(440,80)">
          <ellipse cx="0" cy="0" rx="14" ry="9" fill="url(#humanEye)"/>
          <circle cx="0" cy="0" r="4" fill="#fff"/>
        </g>
      </g>
    </g>

    <!-- divider -->
    <line x1="30" y1="216" x2="510" y2="216" stroke="#cfe6d8" stroke-dasharray="4 4"/>

    <!-- next: agents consume observability -->
    <g transform="translate(30,236)">
      <text font-size="14" font-weight="700" fill="#1f7a4d">NEXT — agents on agents</text>
      <g transform="translate(0,16)" filter="url(#softShadow)">
        <rect width="480" height="120" rx="10" fill="#ffffff" stroke="#cfe6d8"/>

        <!-- observed agent -->
        <g transform="translate(40,60)">
          <circle r="22" fill="url(#agentEye)"/>
          <circle r="8" fill="#e6f1f7"/>
          <text y="42" text-anchor="middle" font-size="11" fill="#156082">observed</text>
        </g>

        <!-- signal flow: spans / logs / metrics -->
        <g transform="translate(80,42)" font-size="10" font-family="'JetBrains Mono',monospace" fill="#1f7a4d">
          <rect width="80" height="10" rx="2" fill="#3aa372"/>
          <rect y="14" width="60" height="10" rx="2" fill="#3aa372" opacity="0.8"/>
          <rect y="28" width="100" height="10" rx="2" fill="#3aa372" opacity="0.6"/>
          <text y="58" font-size="11" fill="#1f7a4d">spans · logs · metrics</text>
        </g>

        <!-- observer agent (with neural-net hint) -->
        <g transform="translate(420,60)">
          <circle r="26" fill="url(#futureEye)"/>
          <!-- mini network glyph -->
          <g stroke="#fff" stroke-width="1.2" fill="#fff">
            <circle cx="-8" cy="-6" r="2"/>
            <circle cx="-8" cy="6" r="2"/>
            <circle cx="0" cy="0" r="2"/>
            <circle cx="8" cy="-6" r="2"/>
            <circle cx="8" cy="6" r="2"/>
            <line x1="-8" y1="-6" x2="0" y2="0"/>
            <line x1="-8" y1="6" x2="0" y2="0"/>
            <line x1="8" y1="-6" x2="0" y2="0"/>
            <line x1="8" y1="6" x2="0" y2="0"/>
          </g>
          <text y="46" text-anchor="middle" font-size="11" fill="#1f7a4d">observer</text>
        </g>

        <!-- arrow -->
        <path d="M200,80 L380,80" stroke="#1f7a4d" stroke-width="2" fill="none"
              marker-end="url(#arrowGreen)"/>
      </g>
    </g>

    <text x="30" y="402" font-size="15" fill="#0e2433" font-style="italic">
      The next consumer of telemetry
    </text>
    <text x="30" y="422" font-size="15" fill="#0e2433" font-style="italic">
      is another agent.
    </text>
  </g>

  <defs>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#1f7a4d"/>
    </marker>
  </defs>

  <!-- Bottom anchor line: the throughline -->
  <g transform="translate(80,790)">
    <rect width="1760" height="200" rx="14" fill="#0e2433"/>
    <text x="40" y="56" font-size="14" letter-spacing="4" fill="#7fb6e6" font-weight="700">THE THROUGHLINE</text>
    <text x="40" y="110" font-size="30" font-weight="600" fill="#ffffff">
      Observability is how developers
      <tspan fill="#9ed6f0"> understand what an autonomous system is doing</tspan>
    </text>
    <text x="40" y="152" font-size="30" font-weight="600" fill="#ffffff">
      — and how they
      <tspan fill="#9ed6f0">monitor it in realtime</tspan>,
      without privileged access to the platform beneath it.
    </text>
  </g>

  <!-- footer -->
  <g transform="translate(80,1020)">
    <text font-size="13" letter-spacing="2" fill="#4a6275">KAGENTI · OPEN SOURCE OBSERVABILITY FOR AGENTS</text>
    <text x="1760" font-size="13" letter-spacing="2" fill="#4a6275" text-anchor="end">2026 → next</text>
  </g>
</svg>
