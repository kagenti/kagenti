# Kagenti CI configuration for HyperShift ephemeral clusters
# Based on ocp_values.yaml but disables components not installed on CI clusters:
#   - Shipwright (requires OpenShift Builds operator)
#   - Kiali (not installed on ephemeral clusters)
#
# RHOAI and MLflow are enabled — the RHOAI operator is installed via OLM
# Subscription (kagenti-deps) and MLflow is provisioned via deferred Step 3c
# in setup-kagenti.sh. The DSC explicitly disables all other RHOAI components
# to avoid heavy default installs on CI.
#
# This config is used by KAGENTI_CONFIG_FILE in E2E tests to correctly
# skip tests for features that are not present on the cluster.

create_kind_cluster: false

charts:
  kagenti-deps:
    enabled: true
    values:
      openshift: true
      components:
        mcpInspector:
          enabled: true
        istio:
          enabled: true
        kiali:
          enabled: false
        keycloak:
          enabled: true
        otel:
          enabled: true
        phoenix:
          enabled: false
        mlflow:
          enabled: true
          routeNamespace: "redhat-ods-applications"
        spire:
          enabled: true
        tekton:
          enabled: true
        shipwright:
          enabled: false
        certManager:
          enabled: true
        rhoai:
          enabled: true
        gatewayApi:
          enabled: false
      mlflow:
        auth:
          enabled: false

  kagenti:
    enabled: true
    values:
      openshift: true
      featureFlags:
        sandbox: true
        integrations: true
        triggers: true
      components:
        agentNamespaces:
          enabled: true
        platformOperator:
          enabled: true
        platformWebhook:
          enabled: true
        ui:
          enabled: true
        mcpGateway:
          enabled: true
        istio:
          enabled: false
        phoenix:
          enabled: false
      mlflow:
        auth:
          enabled: false
      ui:
        auth:
          enabled: true
        backend:
          defaultRegistryUrl: "image-registry.openshift-image-registry.svc:5000"
          shipwrightDefaultStrategy: "buildah"
      uiOAuthSecret:
        useServiceAccountCA: true
      keycloak:
        url: http://keycloak-service.keycloak:8080
      agentNamespaces:
        - team1
        - team2
      # OCP/HyperShift: the hosted cluster's Services + DNS resolver live in the
      # service network (172.31.0.0/16 on this hosted shape; 172.30.0.0/16 on
      # default OCP), which is OUTSIDE the operator's Kind-shaped 10/8 default.
      # enforce-redirect leaves in-cluster DNS direct only for CLUSTER_CIDRS, so
      # with the 10/8 default the agent's UDP/53 to the 172.31.x resolver is
      # DROPped -> name resolution fails -> agent->MCP egress fails. Override the
      # operator's proxy.clusterCIDRs with the real pod + service ranges so DNS
      # stays direct while non-DNS in-cluster TCP is still captured. (Validation
      # of the CLUSTER_CIDRS theory for PR #1911; the durable fix exempts the
      # resolv.conf nameservers directly in proxy-init.)
      kagenti-operator-chart:
        defaults:
          proxy:
            clusterCIDRs:
              - "10.0.0.0/8"
              - "172.30.0.0/16"
              - "172.31.0.0/16"

  mcpGateway:
    enabled: true

  kuadrant:
    enabled: true

  spire:
    enabled: false

rhoai:
  enabled: true
