# Kagenti CI configuration for HyperShift ephemeral clusters
# Based on ocp_values.yaml but disables components not pre-installed on CI clusters:
#   - Shipwright (requires OpenShift Builds operator subscription)
#   - Kiali (not installed on ephemeral clusters)
#
# RHOAI and MLflow are enabled because setup-kagenti.sh installs the RHOAI
# operator via kagenti-deps OLM subscription and provisions MLflow in Step 3c.
#
# This config is used by KAGENTI_CONFIG_FILE in E2E tests to correctly
# skip tests for features that are not present on the cluster.

create_kind_cluster: false

charts:
  kagenti-deps:
    enabled: true
    values:
      openshift: true
      components:
        mcpInspector:
          enabled: true
        istio:
          enabled: true
        kiali:
          enabled: false
        keycloak:
          enabled: true
        otel:
          enabled: true
        phoenix:
          enabled: false
        mlflow:
          enabled: true
        spire:
          enabled: true
        tekton:
          enabled: true
        shipwright:
          enabled: false
        certManager:
          enabled: true
        rhoai:
          enabled: true
        gatewayApi:
          enabled: false
      mlflow:
        auth:
          enabled: false

  kagenti:
    enabled: true
    values:
      openshift: true
      featureFlags:
        sandbox: true
        integrations: true
        triggers: true
      components:
        agentNamespaces:
          enabled: true
        platformOperator:
          enabled: true
        platformWebhook:
          enabled: true
        ui:
          enabled: true
        mcpGateway:
          enabled: true
        istio:
          enabled: false
        phoenix:
          enabled: false
      mlflow:
        auth:
          enabled: false
      ui:
        auth:
          enabled: true
        backend:
          defaultRegistryUrl: "image-registry.openshift-image-registry.svc:5000"
      uiOAuthSecret:
        useServiceAccountCA: true
      keycloak:
        url: http://keycloak-service.keycloak:8080
      agentNamespaces:
        - team1
        - team2

  mcpGateway:
    enabled: true

  kuadrant:
    enabled: true

  spire:
    enabled: false

rhoai:
  enabled: true
  profile: minimal
  channel: fast-3.x
