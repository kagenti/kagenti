apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: kagenti-system
  labels:
    app.kubernetes.io/name: litellm-proxy
    app.kubernetes.io/component: model-gateway
    app.kubernetes.io/part-of: kagenti
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-proxy
        app.kubernetes.io/component: model-gateway
        # NOTE: Istio ambient labels intentionally omitted.
        # LiteLLM must reach postgres (outside mesh) without mTLS interception.
        # Inbound traffic from agents goes through the Istio waypoint via the
        # Service, so LiteLLM endpoints are still protected.
    spec:
      serviceAccountName: litellm-proxy
      securityContext:
        # LiteLLM upstream image requires root (Prisma binaries).
        # runAsNonRoot: false is intentional — see TODO(#1126).
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: litellm
        image: ghcr.io/berriai/litellm-database:main-v1.63.14-stable
        securityContext:
          # Upstream image bakes Prisma binaries as root-owned in /root/.cache.
          # These files have root:root ownership with restrictive SELinux labels
          # that prevent non-root UIDs from stat()ing them on OpenShift.
          # Requires anyuid-seccomp SCC (runAsUser: 0 + seccomp RuntimeDefault).
          # TODO(#1126): Build custom image that runs as non-root.
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        args:
        - --config
        - /app/config.yaml
        - --port
        - "4000"
        ports:
        - containerPort: 4000
          name: http
          protocol: TCP
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-proxy-secret
              key: master-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: litellm-proxy-secret
              key: database-url
        - name: STORE_MODEL_IN_DB
          value: "True"
        - name: LITELLM_LOG
          value: "INFO"
        # Prisma query engine binaries are baked at /root/.cache in the image.
        # Set HOME=/root so the non-root process finds them via $HOME/.cache.
        # The binaries are world-readable (644/755) so no root UID needed.
        - name: HOME
          value: /root
        envFrom:
        - secretRef:
            name: litellm-model-keys
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 45
          periodSeconds: 30
          timeoutSeconds: 5
      volumes:
      - name: config
        configMap:
          name: litellm-config
      - name: tmp
        emptyDir: {}
