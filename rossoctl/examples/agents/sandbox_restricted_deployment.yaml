# Deployment manifest for sandbox-restricted
# Most restrictive variant: hardened security, PostgreSQL persistence,
# reduced workspace (1Gi), proxy allowlist for egress control.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-restricted
  namespace: team1
  labels:
    rossoctl.io/protocol: a2a
    rossoctl.io/framework: LangGraph
    rossoctl.io/workload-type: deployment
    app.kubernetes.io/name: sandbox-restricted
    app.kubernetes.io/managed-by: rossoctl-e2e
    app.kubernetes.io/component: agent
  annotations:
    rossoctl.io/description: "Restricted sandbox - hardened, minimal proxy allowlist, 1Gi workspace"
    rossoctl.io/isolation-mode: shared
    rossoctl.io/proxy-allowlist: "github.com, api.github.com"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-restricted
  template:
    metadata:
      labels:
        rossoctl.io/protocol: a2a
        rossoctl.io/framework: LangGraph
        app.kubernetes.io/name: sandbox-restricted
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agent
        image: image-registry.openshift-image-registry.svc:5000/team1/sandbox-agent:v0.0.1
        imagePullPolicy: Always
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        env:
        - name: PORT
          value: "8000"
        - name: HOST
          value: "0.0.0.0"
        - name: WORKSPACE_ROOT
          value: "/workspace"
        - name: LLM_API_BASE
          value: "http://llm-budget-proxy.team1.svc:8080/v1"
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-virtual-keys
              key: api-key
        - name: LLM_MODEL
          value: "llama-4-scout"
        - name: UV_CACHE_DIR
          value: "/app/.cache/uv"
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token-secret
              key: token
        - name: TASK_STORE_DB_URL
          value: "postgresql+psycopg://rossoctl:rossoctl-sessions-dev@postgres-sessions.team1:5432/sessions?sslmode=disable"
        - name: CHECKPOINT_DB_URL
          value: "postgresql://rossoctl:rossoctl-sessions-dev@postgres-sessions.team1:5432/sessions?sslmode=disable"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: cache
          mountPath: /app/.cache
      volumes:
      - name: workspace
        emptyDir:
          sizeLimit: 1Gi
      - name: cache
        emptyDir: {}
---
apiVersion: agent.rossoctl.dev/v1alpha1
kind: AgentRuntime
metadata:
  name: sandbox-restricted
  namespace: team1
  labels:
    app.kubernetes.io/name: sandbox-restricted
    app.kubernetes.io/managed-by: rossoctl-e2e
spec:
  type: agent
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sandbox-restricted
