apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-demo
  namespace: rossoctl-system
  labels:
    app: app-demo
spec:
  parentRefs:
    - name: http
      namespace: rossoctl-system
  hostnames:
    - "app-demo.localtest.me"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: app-demo-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-demo-frontend
          port: 8080
