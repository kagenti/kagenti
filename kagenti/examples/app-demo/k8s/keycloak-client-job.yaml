apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-demo-keycloak-setup
  namespace: kagenti-system
  labels:
    app: app-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-demo-keycloak-secret-reader
  namespace: keycloak
  labels:
    app: app-demo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak-initial-admin"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-demo-keycloak-secret-reader
  namespace: keycloak
  labels:
    app: app-demo
subjects:
  - kind: ServiceAccount
    name: app-demo-keycloak-setup
    namespace: kagenti-system
roleRef:
  kind: Role
  name: app-demo-keycloak-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: app-demo-keycloak-client
  namespace: kagenti-system
  labels:
    app: app-demo
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: app-demo
        component: keycloak-setup
    spec:
      serviceAccountName: app-demo-keycloak-setup
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-keycloak
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until curl -sf http://keycloak-service.keycloak.svc.cluster.local:8080/realms/master; do
                echo "Keycloak not ready, retrying in 5s..."
                sleep 5
              done
              echo "Keycloak is ready"
      containers:
        - name: register-client
          image: localhost/app-demo-keycloak:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak-service.keycloak.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "kagenti"
            - name: KEYCLOAK_NAMESPACE
              value: "keycloak"
            - name: CLIENT_ID
              value: "app-demo"
            - name: ROOT_URL
              value: "http://app-demo.localtest.me:8080"
