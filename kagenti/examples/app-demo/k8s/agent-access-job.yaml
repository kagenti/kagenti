apiVersion: batch/v1
kind: Job
metadata:
  name: app-demo-agent-access
  namespace: kagenti-system
  labels:
    app: app-demo
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: app-demo
        component: agent-access
    spec:
      serviceAccountName: app-demo-keycloak-setup
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-keycloak
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until curl -sf http://keycloak-service.keycloak.svc.cluster.local:8080/realms/master; do
                echo "Keycloak not ready, retrying in 5s..."
                sleep 5
              done
              echo "Keycloak is ready"
      containers:
        - name: grant-agent-access
          image: localhost/app-demo-keycloak:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "grant_agent_access.py"]
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak-service.keycloak.svc.cluster.local:8080"
            - name: KEYCLOAK_REALM
              value: "kagenti"
            - name: KEYCLOAK_NAMESPACE
              value: "keycloak"
            - name: CLIENT_ID
              value: "app-demo"
            - name: DOMAIN_NAME
              value: "localtest.me"
