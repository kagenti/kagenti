# This template creates Secrets, ConfigMaps, and RoleBindings for agent namespaces.
# The namespaces themselves are created as pre-install hooks in agent-namespaces.yaml.
# This separation ensures hooks complete quickly (only 2 Namespace objects in the hook).
# All resources here are created during the main install phase, not as hooks.
{{- include "rossoctl.authBridge.validateSpiffeIdentity" . -}}
{{- if .Values.agentNamespaces }}
{{- $root := . }}
{{- range $root.Values.agentNamespaces }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  Secrets for Namespace: {{ . }}
# ——————————————————————————————————————————————————————————————————————————————
{{- if and $.Values.secrets.githubUser $.Values.secrets.githubToken }}
# 1. GitHub Token Secret (for general use — only created when GitHub credentials are provided)
apiVersion: v1
kind: Secret
metadata:
  name: github-token-secret
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
type: Opaque
stringData:
  user: {{ $.Values.secrets.githubUser | quote }}
  token: {{ $.Values.secrets.githubToken | quote }}
---
# 2. GitHub Shipwright Secret (for Shipwright Build git clone)
#    Shipwright requires kubernetes.io/basic-auth type with username/password fields
apiVersion: v1
kind: Secret
metadata:
  name: github-shipwright-secret
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $.Values.secrets.githubUser | quote }}
  password: {{ $.Values.secrets.githubToken | quote }}
---
# 3. GHCR Docker Registry Secret (for pulling private images)
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ (printf "{\"auths\":{\"ghcr.io\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" $.Values.secrets.githubUser $.Values.secrets.githubToken (printf "%s:%s" $.Values.secrets.githubUser $.Values.secrets.githubToken | b64enc)) | b64enc }}
---
{{ end }}
# 4. OpenAI API Key Secret
apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
type: Opaque
stringData:
  apikey: {{ $.Values.secrets.openaiApiKey | quote }}
---
# 5. Slack Bot Tokens Secret
apiVersion: v1
kind: Secret
metadata:
  name: slack-secret
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
type: Opaque
stringData:
  bot-token: {{ $.Values.secrets.slackBotToken | quote }}
  admin-bot-token: {{ $.Values.secrets.adminSlackBotToken | quote }}
---
# 6. Quay.io Docker Registry Secret (for pushing images)
apiVersion: v1
kind: Secret
metadata:
  name: quay-registry-secret
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ (printf "{\"auths\":{\"quay.io\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" $.Values.secrets.quayUser $.Values.secrets.quayToken (printf "%s:%s" $.Values.secrets.quayUser $.Values.secrets.quayToken | b64enc)) | b64enc }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  AuthBridge Config for operator in Namespace: {{ . }}
#  The rossoctl-operator ClientRegistrationReconciler reads KEYCLOAK_URL and
#  KEYCLOAK_REALM from this ConfigMap to register workload clients in Keycloak.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-config
  namespace: {{ . }}
data:
  KEYCLOAK_URL: "http://keycloak-service.{{ $root.Values.keycloak.namespace }}.svc:8080"
  KEYCLOAK_REALM: {{ $root.Values.keycloak.realm | quote }}
  KEYCLOAK_NAMESPACE: "{{ $root.Values.keycloak.namespace }}"
  ISSUER: "{{ $root.Values.keycloak.publicUrl }}/realms/{{ $root.Values.keycloak.realm }}"
  SPIRE_ENABLED: {{ if $root.Values.spire.enabled }}"true"{{ else }}"false"{{ end }}
  CLIENT_AUTH_TYPE: "{{ $root.Values.authBridge.clientAuthType }}"
  SPIFFE_IDP_ALIAS: "{{ $root.Values.authBridge.spiffeIdpAlias }}"
  EXPECTED_AUDIENCE: "{{ $root.Values.keycloak.publicUrl }}/realms/{{ $root.Values.keycloak.realm }}"
  CREDENTIAL_WAIT_TIMEOUT: {{ $root.Values.authBridge.credentialWaitTimeout | quote }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  ConfigMap for Envoy in Namespace: {{ . }}
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: {{ . }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          protocol: TCP
          address: 127.0.0.1
          port_value: 9901

    static_resources:
      listeners:
      - name: outbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 15123
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
        filter_chains:
        # TLS passthrough: forward HTTPS traffic as-is via TCP proxy
        - filter_chain_match:
            transport_protocol: tls
          filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: outbound_tls_passthrough
              cluster: original_destination
        # Plaintext HTTP: inspect and process via ext_proc
        - filter_chain_match:
            transport_protocol: raw_buffer
          filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: outbound_http
              codec_type: AUTO
              route_config:
                name: outbound_routes
                virtual_hosts:
                - name: catch_all
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: original_destination
                      timeout: 300s
              http_filters:
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 300s
                  message_timeout: 310s
                  allow_mode_override: true
                  processing_mode:
                    request_header_mode: SEND
                    response_header_mode: SEND
                    request_body_mode: NONE
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      - name: inbound_listener
        address:
          socket_address:
            protocol: TCP
            address: 0.0.0.0
            port_value: 15124
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        filter_chains:
        # AuthBridge config and stats passthrough
        - filter_chain_match:
            destination_port: 9093
          filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: outbound_passthrough_9093
              cluster: original_destination
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: inbound_http
              codec_type: AUTO
              route_config:
                name: inbound_routes
                virtual_hosts:
                - name: local_app
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: original_destination
                      timeout: 300s
              http_filters:
              # Lua filter injects x-authbridge-direction BEFORE ext_proc runs.
              # Route-level request_headers_to_add does not work because the
              # router filter runs after ext_proc.
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: |
                    function envoy_on_request(request_handle)
                      request_handle:headers():add("x-authbridge-direction", "inbound")
                    end
              - name: envoy.filters.http.ext_proc
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                  grpc_service:
                    envoy_grpc:
                      cluster_name: ext_proc_cluster
                    timeout: 300s
                  message_timeout: 310s
                  allow_mode_override: true
                  processing_mode:
                    request_header_mode: SEND
                    response_header_mode: SEND
                    request_body_mode: NONE
                    response_body_mode: NONE
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: original_destination
        connect_timeout: 30s
        type: ORIGINAL_DST
        lb_policy: CLUSTER_PROVIDED
        original_dst_lb_config:
          use_http_header: false

      - name: ext_proc_cluster
        connect_timeout: 5s
        type: STATIC
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: ext_proc_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 9090
---
# ——————————————————————————————————————————————————————————————————————————————
#  ConfigMap for AuthBridge in Namespace: {{ . }}
#  YAML config for the authbridge binaries (authbridge-proxy / -envoy /
#  -lite — see cortex#411). Supports envoy-sidecar,
#  proxy-sidecar (default), and lite shapes. The operator resolves the
#  per-workload mode via the chain
#    AgentRuntime.Spec.AuthBridgeMode → this ConfigMap's `mode:` field
#    → deprecated rossoctl.io/authbridge-mode annotation → cluster default
#  (rossoctl-operator#361) and layers it onto each per-agent ConfigMap.
#  Listener addresses are injected as env vars and expanded via ${...}
#  at startup.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: ConfigMap
metadata:
  name: authbridge-runtime-config
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
data:
  # Per-plugin config. Plugin-level defaults (audience_file,
  # bypass_paths, identity file paths, etc.) are applied by the
  # authbridge binary itself — see
  # authbridge/authlib/plugins/CONVENTIONS.md in cortex.
  #
  # No top-level `mode:` — see the matching template-configmap in
  # authbridge-template-configmaps.yaml for the rationale.
  config.yaml: |
    {{- include "rossoctl.authbridge-runtime-config-yaml" $root | nindent 4 }}
---
{{- if $.Values.openshift }}
# ——————————————————————————————————————————————————————————————————————————————
#  SCC RoleBinding for Pipeline SA in Namespace: {{ . }}
#  Grants privileged SCC to the pipeline service account for buildah builds.
#  Buildah requires SETUID/SETGID capabilities which only privileged SCC provides.
#  Note: RoleBindings are idempotent - safe to apply even if already exists.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-privileged-scc
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: {{ . }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  SCC RoleBinding for AuthBridge in Namespace: {{ . }}
#  Grants the rossoctl-authbridge custom SCC to all service accounts so that
#  the webhook-injected AuthBridge stack can run. After cortex#411
#  there's a single combined sidecar per mode (spiffe-helper bundled inside,
#  client-registration is operator-managed):
#    - proxy-sidecar (default): authbridge container (UID 1337)
#    - envoy-sidecar: proxy-init init container (NET_ADMIN/NET_RAW, root)
#      for iptables, then authbridge-envoy container (UID 1337)
#  Agent SAs are created dynamically by the operator (name = agent name),
#  so we use the namespace service accounts group.
#
#  Requires cortex#234 (webhook uses capabilities instead of
#  privileged mode). Use --extensions-ref to test:
#    /run-e2e --extensions-ref fix/proxy-init-drop-privileged
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-authbridge-scc
  namespace: {{ . }}
  labels:
    {{- include "rossoctl.labels" $root | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:rossoctl-authbridge
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:serviceaccounts:{{ . }}
{{- end }}
{{- end }}
{{- end }}
