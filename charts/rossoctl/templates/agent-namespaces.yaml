# This template creates the agent namespaces listed in values.agentNamespaces.
# Secrets, ConfigMaps, and RoleBindings for those namespaces are created by
# agent-namespace-resources.yaml to avoid duplicates during helm install.
{{- include "rossoctl.authBridge.validateSpiffeIdentity" . -}}
{{- if .Values.agentNamespaces }}
{{- $root := . }}
{{- range $root.Values.agentNamespaces }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  Namespace: {{ . }}
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  labels:
    rossoctl-enabled: "true"
    istio-discovery: enabled
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    shared-gateway-access: "true"
    {{- if $root.Values.openshift }}
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    {{- end }}
  {{- include "rossoctl.labels" $root | nindent 4 }}
{{- end }}
{{- end }}
