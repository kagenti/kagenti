{{- if and .Values.components.ui.enabled }}
{{- if not .Values.openshift }}
# ConfigMap for dashboard URLs (non-OpenShift only)
# In OpenShift, this ConfigMap is created by the ui-routes-job
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.ui.configmap }}
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-ui
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
data:
  DOMAIN_NAME: "{{ .Values.ui.domainName }}"
  API_URL: "http://{{ .Values.ui.api.hostname }}:8080"
  {{- if .Values.components.phoenix.enabled }}
  TRACES_DASHBOARD_URL: "http://phoenix.{{ .Values.ui.domainName }}:8080"
  {{- else }}
  TRACES_DASHBOARD_URL: ""
  {{- end }}
  {{- if .Values.components.mlflow.enabled }}
  MLFLOW_DASHBOARD_URL: "http://mlflow.{{ .Values.ui.domainName }}:8080"
  {{- else }}
  MLFLOW_DASHBOARD_URL: ""
  {{- end }}
  {{- if .Values.featureFlags.traceAnalysis }}
  TRACE_ANALYSIS_DASHBOARD_URL: "http://trace-analysis.{{ .Values.ui.domainName }}:8080"
  {{- else }}
  TRACE_ANALYSIS_DASHBOARD_URL: ""
  {{- end }}
  NETWORK_TRAFFIC_DASHBOARD_URL: "http://kiali.{{ .Values.ui.domainName }}:8080"
  MCP_INSPECTOR_URL: "http://mcp-inspector.{{ .Values.ui.domainName }}:8080"
  # Proxy served on the inspector host under /mcp-proxy by the nginx sidecar
  # (single origin).
  MCP_PROXY_FULL_ADDRESS: "http://mcp-inspector.{{ .Values.ui.domainName }}:8080/mcp-proxy"
  KEYCLOAK_CONSOLE_URL: "http://keycloak.{{ .Values.ui.domainName }}:8080/admin/{{ .Values.keycloak.realm }}/console/"
---
{{- end }}
# Backend Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rossoctl-backend
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-backend
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rossoctl-backend
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: rossoctl-ui
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rossoctl-backend
  template:
    metadata:
      annotations:
        # Force pod restart whenever the in-chart ConfigMap or OAuth-secret inputs change.
        # See https://helm.sh/docs/howto/charts_tips_and_tricks/#automatically-roll-deployments
        checksum/config: {{ printf "%s|%s|%s|%s|%s|%t|%t" .Values.ui.domainName .Values.ui.api.hostname .Values.ui.namespace .Values.ui.configmap .Values.keycloak.realm .Values.components.phoenix.enabled .Values.components.mlflow.enabled | sha256sum }}
        checksum/oauth-config: {{ printf "%s|%s|%s|%s" .Values.keycloak.url .Values.keycloak.publicUrl .Values.keycloak.realm .Values.ui.namespace | sha256sum }}
        checksum/authbridge-runtime-config: {{ include "rossoctl.authbridge-runtime-config-yaml" . | sha256sum }}
      labels:
        app.kubernetes.io/name: rossoctl-backend
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: rossoctl-backend
      {{- if .Values.ui.auth.enabled }}
      initContainers:
      - name: wait-for-oauth-secret
        image: {{ .Values.common.kubectlImage }}
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for OAuth secret to be created..."
          # it may take time as if keycloak was just installed it takes some time to be available
          MAX_ATTEMPTS=120
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            if kubectl get secret rossoctl-ui-oauth-secret -n {{ .Values.ui.namespace }} >/dev/null 2>&1; then
              echo "OAuth secret found. Verifying required keys..."
              REQUIRED_KEYS="CLIENT_ID CLIENT_SECRET AUTH_ENDPOINT TOKEN_ENDPOINT REDIRECT_URI"
              ALL_PRESENT=true
              for KEY in $REQUIRED_KEYS; do
                if ! kubectl get secret rossoctl-ui-oauth-secret -n {{ .Values.ui.namespace }} -o jsonpath='{.data.'$KEY'}' >/dev/null 2>&1; then
                  echo "Missing key: $KEY"
                  ALL_PRESENT=false
                fi
              done
              if [ "$ALL_PRESENT" = "true" ]; then
                echo "All required OAuth keys are present. Proceeding..."
                exit 0
              else
                echo "Some keys are missing. Waiting 2 seconds... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
                sleep 2
              fi
            else
              echo "OAuth secret not found. Waiting 2 seconds... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              sleep 2
            fi
          done
          echo "ERROR: OAuth secret not ready after $MAX_ATTEMPTS attempts. Proceeding anyway but authentication may not work."
          exit 0
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.ui.backend.image }}:{{ .Values.ui.backend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DEBUG
              value: "false"
            - name: DOMAIN_NAME
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "DOMAIN_NAME"
                  optional: true
            - name: ENABLE_AUTH
              value: "{{ .Values.ui.auth.enabled }}"
            {{- if .Values.ui.backend.defaultRegistryUrl }}
            - name: DEFAULT_REGISTRY_URL
              value: {{ .Values.ui.backend.defaultRegistryUrl | quote }}
            {{- end }}
            {{- if .Values.ui.backend.shipwrightDefaultStrategy }}
            - name: SHIPWRIGHT_DEFAULT_STRATEGY
              value: {{ .Values.ui.backend.shipwrightDefaultStrategy | quote }}
            {{- end }}
            {{- if .Values.ui.backend.skillRegistryAllowedHosts }}
            - name: SKILL_REGISTRY_ALLOWED_HOSTS
              value: {{ .Values.ui.backend.skillRegistryAllowedHosts | quote }}
            {{- end }}
            # Feature flags
            - name: ROSSOCTL_FEATURE_FLAG_SANDBOX
              value: "{{ .Values.featureFlags.sandbox }}"
            - name: ROSSOCTL_FEATURE_FLAG_INTEGRATIONS
              value: "{{ .Values.featureFlags.integrations }}"
            - name: ROSSOCTL_FEATURE_FLAG_TRIGGERS
              value: "{{ .Values.featureFlags.triggers }}"
            - name: ROSSOCTL_FEATURE_FLAG_AGENT_SANDBOX
              value: "{{ .Values.featureFlags.agentSandbox }}"
            - name: ROSSOCTL_FEATURE_FLAG_SKILLS
              value: "{{ .Values.featureFlags.skills }}"
            - name: ROSSOCTL_FEATURE_FLAG_EXTERNAL_SKILLS
              value: "{{ .Values.featureFlags.externalSkills }}"
            - name: ROSSOCTL_FEATURE_FLAG_DREAMING
              value: "{{ .Values.featureFlags.dreaming }}"
            - name: ROSSOCTL_FEATURE_FLAG_AUTHBRIDGE_API
              value: "{{ .Values.featureFlags.authbridgeAPI }}"
            - name: ROSSOCTL_FEATURE_FLAG_ADMIN
              value: "{{ .Values.featureFlags.admin }}"
            - name: ROSSOCTL_FEATURE_FLAG_TRACE_ANALYSIS
              value: "{{ .Values.featureFlags.traceAnalysis }}"
            - name: ROSSOCTL_FEATURE_FLAG_SIMULATED_TOOLS
              value: "{{ .Values.featureFlags.simulatedTools }}"
            - name: KEYCLOAK_URL
              value: {{ .Values.keycloak.url | quote }}
            - name: KEYCLOAK_PUBLIC_URL
              value: {{ .Values.keycloak.publicUrl | quote }}
            # Dashboard URLs from ConfigMap (populated by ui-routes-job)
            - name: TRACES_DASHBOARD_URL
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "TRACES_DASHBOARD_URL"
                  optional: true
            - name: NETWORK_DASHBOARD_URL
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "NETWORK_TRAFFIC_DASHBOARD_URL"
                  optional: {{ (not .Values.openshift) }}
            - name: MLFLOW_DASHBOARD_URL
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "MLFLOW_DASHBOARD_URL"
                  optional: true
            - name: TRACE_ANALYSIS_DASHBOARD_URL
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "TRACE_ANALYSIS_DASHBOARD_URL"
                  optional: true
            - name: MCP_INSPECTOR_URL
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "MCP_INSPECTOR_URL"
                  optional: {{ (not .Values.openshift) }}
            - name: MCP_PROXY_FULL_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "MCP_PROXY_FULL_ADDRESS"
                  optional: {{ (not .Values.openshift) }}
            - name: KEYCLOAK_CONSOLE_URL
              valueFrom:
                configMapKeyRef:
                  name: "{{ .Values.ui.configmap }}"
                  key: "KEYCLOAK_CONSOLE_URL"
                  optional: {{ (not .Values.openshift) }}
            {{- if .Values.uiOAuthSecret.useServiceAccountCA }}
            - name: SSL_CERT_FILE
              valueFrom:
                secretKeyRef:
                  name: rossoctl-ui-oauth-secret
                  key: SSL_CERT_FILE
                  optional: {{ or (not .Values.openshift) (not .Values.ui.auth.enabled) }}
            {{- end }}
            - name: AUTH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: rossoctl-ui-oauth-secret
                  key: AUTH_ENDPOINT
                  optional: true
            - name: REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: rossoctl-ui-oauth-secret
                  key: REDIRECT_URI
                  optional: true
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rossoctl-ui-oauth-secret
                  key: CLIENT_ID
                  optional: true
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rossoctl-ui-oauth-secret
                  key: CLIENT_SECRET
                  optional: true
            - name: TOKEN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: rossoctl-ui-oauth-secret
                  key: TOKEN_ENDPOINT
                  optional: true
            - name: SCOPE
              valueFrom:
                secretKeyRef:
                  name: rossoctl-ui-oauth-secret
                  key: SCOPE
                  optional: true
            {{- if .Values.featureFlags.sandbox }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-proxy-secret
                  key: master-key
                  optional: true
            {{- end }}
          resources:
            {{- toYaml .Values.ui.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: authbridge-runtime-config
              mountPath: /etc/rossoctl/authbridge
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: authbridge-runtime-config
          configMap:
            name: authbridge-runtime-config
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: rossoctl-backend
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-backend
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: rossoctl-backend
---
{{- if .Values.ui.frontend.enabled }}
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rossoctl-ui
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: rossoctl-ui
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rossoctl-ui
  template:
    metadata:
      annotations:
        # Force pod restart whenever the in-chart ConfigMap or OAuth-secret inputs change.
        # See https://helm.sh/docs/howto/charts_tips_and_tricks/#automatically-roll-deployments
        checksum/config: {{ printf "%s|%s|%s|%s|%s|%t|%t" .Values.ui.domainName .Values.ui.api.hostname .Values.ui.namespace .Values.ui.configmap .Values.keycloak.realm .Values.components.phoenix.enabled .Values.components.mlflow.enabled | sha256sum }}
        checksum/oauth-config: {{ printf "%s|%s|%s|%s" .Values.keycloak.url .Values.keycloak.publicUrl .Values.keycloak.realm .Values.ui.namespace | sha256sum }}
      labels:
        app.kubernetes.io/name: rossoctl-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.ui.frontend.image }}:{{ .Values.ui.frontend.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            {{- toYaml .Values.ui.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
          - mountPath: /var/cache/nginx
            name: cache
          - mountPath: /var/run
            name: var-run
      volumes:
      - emptyDir: {}
        name: cache
      - emptyDir: {}
        name: var-run
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: rossoctl-ui
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-ui
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: rossoctl-ui
{{- end }}
---
# Backend RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rossoctl-backend
  labels:
    app.kubernetes.io/name: rossoctl-backend
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["agent.rossoctl.dev"]
    resources: ["agents"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # AgentRuntime CRs trigger sidecar injection by the AuthBridge webhook
  - apiGroups: ["agent.rossoctl.dev"]
    resources: ["agentruntimes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Shipwright build resources for building agents and tools from source
  - apiGroups: ["shipwright.io"]
    resources: ["builds", "buildruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["shipwright.io"]
    resources: ["clusterbuildstrategies"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # ConfigMaps: list/get for reads; create/update/patch for AuthBridge finalize
  # (authbridge-config, envoy-config, spiffe-helper-config, authproxy-routes merge).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  {{- if .Values.featureFlags.skills }}
  # Skills-specific: delete required for skill deletion via the Skills API.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["delete"]
  {{- end }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list"]
  {{- if .Values.featureFlags.sandbox }}
  # Sandbox-specific: create pods, exec, logs, and mutate configmaps/secrets/PVCs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/exec", "pods/log"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "delete"]
  {{- end }}
  # Deployments, StatefulSets and Services for managing workloads
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # Jobs for batch workloads
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # ServiceAccounts — ensure_service_account() creates a dedicated SA so the
  # webhook's SPIFFE identity uses the workload name (see rossoctl#959)
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "create"]
  # RoleBindings — ensure_rolebinding() creates agent-authbridge-scc so service
  # accounts in each agent namespace can use the rossoctl-authbridge SCC (OpenShift).
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "create"]
  {{- if or .Values.featureFlags.sandbox .Values.featureFlags.simulatedTools }}
  # PersistentVolumeClaims — sandbox agent workspace storage, and simulated-tool
  # StatefulSet volumes that the delete path enumerates and tears down (#2151).
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "patch", "delete"]
  {{- end }}
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if .Values.featureFlags.agentSandbox }}
  # agent-sandbox (kubernetes-sigs) — direct Sandbox management
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  {{- end }}
  {{- if .Values.featureFlags.integrations }}
  # Integration CRDs for repository integrations
  - apiGroups: ["rossoctl.io"]
    resources: ["integrations", "integrations/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rossoctl-backend
  labels:
    app.kubernetes.io/name: rossoctl-backend
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rossoctl-backend
subjects:
  - kind: ServiceAccount
    name: rossoctl-backend
    namespace: "{{ .Values.ui.namespace }}"
---
{{- if .Values.openshift }}
{{- if .Values.ui.frontend.enabled }}
# OpenShift Route for UI
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rossoctl-ui
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-ui
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
  annotations:
    openshift.io/host.generated: "true"
    # Agent chat proxied through the UI involves a cold MCP session + multiple
    # LLM round-trips that can exceed HAProxy's 30s default, surfacing as a 504
    # on the first request even though the agent itself completes.
    haproxy.router.openshift.io/timeout: "120s"
spec:
  path: /
  port:
    targetPort: http
  to:
    kind: Service
    name: rossoctl-ui
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
{{- end }}
# OpenShift Route for Backend API (direct external access)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rossoctl-api
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-api
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
  annotations:
    openshift.io/host.generated: "true"
    # Agent chat proxied through the backend API involves a cold MCP session +
    # multiple LLM round-trips that can exceed HAProxy's 30s default, surfacing
    # as a 504 on the first request even though the agent itself completes.
    haproxy.router.openshift.io/timeout: "120s"
spec:
  path: /
  port:
    targetPort: http
  to:
    kind: Service
    name: rossoctl-backend
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- else }}
{{- if .Values.ui.frontend.enabled }}
# HTTPRoute for Kubernetes Gateway API (frontend + backend on UI hostname)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rossoctl-ui
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-ui
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: http
      namespace: "{{ .Values.ui.namespace }}"
  hostnames:
    - "{{ .Values.ui.hostname }}"
  rules:
    # Route /api/* to backend
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: rossoctl-backend
          port: 8000
    # Route everything else to frontend
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rossoctl-ui
          port: 8080
---
{{- end }}
# HTTPRoute for Backend API (direct external access)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rossoctl-api
  namespace: "{{ .Values.ui.namespace }}"
  labels:
    app.kubernetes.io/name: rossoctl-api
    {{- include "rossoctl.commonLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: http
      namespace: "{{ .Values.ui.namespace }}"
  hostnames:
    - "{{ .Values.ui.api.hostname }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rossoctl-backend
          port: 8000
{{- end }}
{{- end }}
