apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openshell-server
  namespace: {{ .Values.tenant }}
  labels:
    {{- include "openshell.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  serviceName: openshell-server
  replicas: 1
  selector:
    matchLabels:
      {{- include "openshell.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      annotations:
        checksum/gateway-config: {{ include (print $.Template.BasePath "/gateway-config.yaml") . | sha256sum }}
      labels:
        {{- include "openshell.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: openshell-gateway
      enableServiceLinks: false
      {{- if .Values.keycloakClusterIP }}
      hostAliases:
        - ip: {{ .Values.keycloakClusterIP | quote }}
          hostnames:
            - keycloak.localtest.me
      {{- end }}
      securityContext:
        runAsNonRoot: true
      {{- if not .Values.openshift.enabled }}
        {{- with .Values.podSecurityContext }}
        {{- toYaml (omit . "runAsNonRoot") | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.images.gateway.repository }}:{{ .Values.images.gateway.tag }}"
          imagePullPolicy: {{ .Values.images.gateway.pullPolicy }}
          args:
            - --config
            - /etc/openshell/gateway.toml
            - --db-url
            - "sqlite:///data/openshell.db"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
          env:
            - name: OPENSHELL_SSH_HANDSHAKE_SECRET
              valueFrom:
                secretKeyRef:
                  name: openshell-gateway-secrets
                  key: ssh-handshake-secret
            - name: OPENSHELL_DRIVERS
              value: "external"
            - name: OPENSHELL_COMPUTE_DRIVER_SOCKET
              value: "/run/drivers/compute.sock"
            - name: OPENSHELL_CREDENTIALS_DRIVER_SOCKET
              value: "/run/drivers/credentials.sock"
            {{- if .Values.trustedCABundle }}
            - name: SSL_CERT_FILE
              value: "/etc/ssl/certs/ca-certificates.crt"
            - name: SSL_CERT_DIR
              value: "/etc/ssl/certs"
            {{- end }}
          volumeMounts:
            - name: driver-sockets
              mountPath: /run/drivers
            - name: data
              mountPath: /data
            - name: gateway-config
              mountPath: /etc/openshell
              readOnly: true
            - name: server-tls
              mountPath: /etc/openshell-tls/server
              readOnly: true
            {{- if .Values.gatewayJwt.enabled }}
            - name: jwt-keys
              mountPath: /etc/openshell-jwt
              readOnly: true
            {{- end }}
            {{- if .Values.trustedCABundle }}
            - name: trusted-ca
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca-bundle.crt
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources.gateway | nindent 12 }}
        - name: compute-driver
          image: "{{ .Values.images.computeDriver.repository }}:{{ .Values.images.computeDriver.tag }}"
          imagePullPolicy: {{ .Values.images.computeDriver.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          args:
            - "-socket=/run/drivers/compute.sock"
            - "-namespace={{ include "openshell.driverNamespace" . }}"
            - "-supervisor-image={{ .Values.supervisorImage.repository }}:{{ .Values.supervisorImage.tag }}"
            - "-gateway-endpoint=https://openshell-server.{{ .Values.tenant }}.svc:8080"
            - "-supervisor-binary-path={{ .Values.supervisorImage.binaryPath }}"
            - "-tls-ca-secret=openshell-server-tls"
            - "-tls-client-secret=openshell-client-tls"
            {{- if .Values.sandboxImagePullPolicy }}
            - "-sandbox-image-pull-policy={{ .Values.sandboxImagePullPolicy }}"
            {{- end }}
            - "-sa-token-audience=openshell-gateway"
            - "-sa-token-ttl-secs={{ .Values.sandboxServiceAccount.tokenTtlSecs }}"
          volumeMounts:
            - name: driver-sockets
              mountPath: /run/drivers
          resources:
            {{- toYaml .Values.resources.computeDriver | nindent 12 }}
        - name: credentials-driver
          image: "{{ .Values.images.credentialsDriver.repository }}:{{ .Values.images.credentialsDriver.tag }}"
          imagePullPolicy: {{ .Values.images.credentialsDriver.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          args:
            - "--socket=/run/drivers/credentials.sock"
            - "--config=/etc/openshell/credentials.yaml"
            - "--secrets-dir=/etc/openshell/secrets"
          volumeMounts:
            - name: driver-sockets
              mountPath: /run/drivers
            - name: credentials-config
              mountPath: /etc/openshell
              readOnly: true
            - name: credentials-secrets
              mountPath: /etc/openshell/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.resources.credentialsDriver | nindent 12 }}
      volumes:
        - name: driver-sockets
          emptyDir: {}
        - name: gateway-config
          configMap:
            name: openshell-gateway-config
        - name: server-tls
          secret:
            secretName: openshell-server-tls
        {{- if .Values.gatewayJwt.enabled }}
        - name: jwt-keys
          secret:
            secretName: {{ .Values.gatewayJwt.signingSecretName | default "openshell-gateway-jwt-keys" }}
            defaultMode: 0400
        {{- end }}
        - name: credentials-config
          configMap:
            name: openshell-credentials-config
        - name: credentials-secrets
          secret:
            secretName: openshell-credentials-secrets
        {{- if .Values.trustedCABundle }}
        - name: trusted-ca
          configMap:
            name: {{ .Values.trustedCABundle }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        {{- end }}
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.size | default "1Gi" }}
