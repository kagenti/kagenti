# -- Tenant name (used as namespace and audience)
tenant: ""

# -- Container images
images:
  gateway:
    repository: ghcr.io/kagenti/openshell/gateway
    tag: v0.0.56-rc.1
    pullPolicy: IfNotPresent
  computeDriver:
    repository: ghcr.io/kagenti/openshell-driver-openshift/compute-driver
    tag: v0.1.0-rc.6
    pullPolicy: IfNotPresent
  credentialsDriver:
    repository: ghcr.io/kagenti/openshell-credentials-keycloak/credentials-driver
    tag: main-d7d8306
    pullPolicy: IfNotPresent

# -- OIDC configuration (issuer and audience are set per-tenant by deploy-tenant.sh)
oidc:
  issuer: ""
  audience: ""
  enabled: true

# -- Keycloak ClusterIP for hostAliases (Kind only, set by deploy-tenant.sh)
# Needed because localtest.me resolves to 127.0.0.1 inside the pod
keycloakClusterIP: ""

# -- Supervisor image injected as an init container by the compute driver
# to copy the openshell-sandbox binary into each sandbox pod.
# Built from kagenti/OpenShell@mvp-v2 as a multi-arch image (linux/amd64 + linux/arm64).
supervisorImage:
  repository: ghcr.io/kagenti/openshell/supervisor
  tag: v0.0.56-rc.1
  binaryPath: /openshell-sandbox

# -- Image pull policy for sandbox pods (init + agent containers).
# Valid values: Always, IfNotPresent, Never.
# Empty string means use the Kubernetes default (Always for :latest, IfNotPresent otherwise).
sandboxImagePullPolicy: "IfNotPresent"

# -- Gateway JWT configuration for sandbox token minting (Ed25519 keypair)
# When enabled, the gateway mints short-lived JWTs for sandbox pods after
# validating their projected ServiceAccount token via TokenReview.
gatewayJwt:
  enabled: true
  # Token TTL in seconds
  ttlSecs: 3600
  # Gateway identity embedded in iss/aud claims (defaults to "openshell-<tenant>")
  gatewayId: ""
  # Secret name for the JWT signing keypair (defaults to "openshell-gateway-jwt-keys")
  signingSecretName: ""

# -- Sandbox service account used by sandbox pods for the IssueSandboxToken bootstrap
sandboxServiceAccount:
  name: openshell-sandbox
  # Lifetime of the projected SA token injected into sandbox pods by the compute driver
  tokenTtlSecs: 3600

# -- Compute driver settings
driver:
  # Target namespace for sandbox pods (defaults to .Values.tenant)
  namespace: ""

# -- Trusted CA bundle ConfigMap name (OpenShift: label a CM with
# config.openshift.io/inject-cabundle=true to get the cluster CAs injected).
# When set, the CA bundle is mounted into the gateway so it can verify
# TLS connections to the Keycloak route.
trustedCABundle: ""

# -- Ingress configuration
ingress:
  # "istio" for Kind (TLSRoute via shared gateway) or "route" for OpenShift (passthrough Route)
  type: istio
  # External hostname for the gateway (used for SNI routing)
  host: ""
  # Shared Istio Gateway name (Kind only — must exist in gatewayNamespace)
  gatewayName: tls-passthrough
  # Namespace of the shared Istio Gateway
  gatewayNamespace: kagenti-system
  # Route timeout (OpenShift only)
  timeout: 24h

# -- Resource quota for sandbox pods
quota:
  pods: "15"
  requestsCpu: "20"
  requestsMemory: "40Gi"
  pvcs: "10"
  # Default resource requests applied via LimitRange to containers that
  # don't specify their own (e.g. sandbox pods from agent-sandbox-controller)
  defaultRequestCpu: 100m
  defaultRequestMemory: 128Mi

# -- OpenShift-specific settings.
# When enabled, creates a SecurityContextConstraints resource scoped to
# OpenShell service accounts so pods can run without granting broad anyuid.
openshift:
  enabled: false

# -- Persistence settings for the gateway StatefulSet PVC.
# Set storageClassName explicitly on clusters without a default StorageClass.
persistence:
  size: 1Gi
  # storageClassName: ""

# -- Pod security context applied to the gateway StatefulSet and certgen Job.
# These defaults work on vanilla Kubernetes (Kind, EKS, GKE, etc.).
# On OpenShift, set openshift.enabled=true — the deploy-tenant.sh script
# automatically overrides podSecurityContext to {} so the platform assigns UIDs.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Gateway resources
resources:
  gateway:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  computeDriver:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  credentialsDriver:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
