{{- if and .Values.components.shipwright.enabled (not .Values.openshift) }}
{{- /*
  Shipwright Build Installation for Vanilla Kubernetes

  This template installs Shipwright Build Controller on non-OpenShift Kubernetes
  clusters by applying the upstream release manifest and sample build strategies.
  On OpenShift, Shipwright is installed via the OpenShift Builds Operator
  (see openshift-builds-operator.yaml).

  The installation uses a Job with a post-install hook (runs after Tekton is ready)
  to ensure proper dependency ordering. Shipwright requires Tekton Pipelines.
*/}}
apiVersion: v1
kind: Namespace
metadata:
  name: shipwright-build
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shipwright-installer
  namespace: shipwright-build
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shipwright-installer
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: shipwright-installer
  namespace: shipwright-build
---
apiVersion: batch/v1
kind: Job
metadata:
  name: shipwright-build-installer
  namespace: shipwright-build
  labels:
    {{- include "kagenti.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "kagenti.labels" . | nindent 8 }}
    spec:
      serviceAccountName: shipwright-installer
      restartPolicy: OnFailure
      containers:
      - name: installer
        image: {{ .Values.common.kubectlImage }}
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Installing Shipwright Build Controller..."
          kubectl apply --filename https://github.com/shipwright-io/build/releases/latest/download/release.yaml --server-side=true

          echo "Installing Shipwright sample build strategies..."
          kubectl apply --filename https://github.com/shipwright-io/build/releases/latest/download/sample-strategies.yaml --server-side=true

          echo "Waiting for Shipwright Build Controller to be ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=shipwright-build,app.kubernetes.io/component=controller -n shipwright-build --timeout=300s

          echo "Shipwright Build installation complete"
{{- end }}
