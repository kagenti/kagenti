# Global settings
openshift: true
# Domain name for SPIFFE trust domain and service URLs
domain: localtest.me

# ------------------------------------------------------------------
#  Feature flags: experimental features disabled by default
# ------------------------------------------------------------------
featureFlags:
  # Sandbox runtime (session management, file browser, sidecars).
  # NOT YET FULLY IMPLEMENTED — backend modules not merged. Do not enable.
  # See PR #996
  sandbox: false
  # Third-party integration endpoints.
  # (Currently undocumented)
  integrations: false
  # Event-driven trigger system.
  # See PR #996
  triggers: false
  # kubernetes-sigs/agent-sandbox Sandbox workload type.
  # Requires agent-sandbox CRDs (Enabled by `--with-agent-sandbox`).
  # See docs/architecture/agent-sandbox.md
  # See docs/superpowers/specs/2026-04-21-agent-sandbox-workload-type-design.md
  agentSandbox: false
  # Pluggable skills system.
  # See PR #1344
  skills: false
  # External skill registry references (skillberry-store, etc.)
  externalSkills: false
  # Enables AuthBridge tab on Agent details page
  # Show this UI by default (we'll remove gate after a version where it can be disabled with a flag)
  authbridgeAPI: true
  # Enables Platform Status card
  # on http://kagenti-ui.localtest.me:8080/admin
  admin: false

# ------------------------------------------------------------------
#  Control Panel: Enable or disable components here
# ------------------------------------------------------------------
components:
  agentNamespaces:
    enabled: true
  mcpGateway:
    enabled: true
  agentOperator:
    enabled: true
  ui:
    enabled: true
  istio:
    enabled: true
  phoenix:
    enabled: false
  mlflow:
    enabled: false
    # Namespace where the MLflow Route lives on OpenShift.
    # Defaults to the release namespace (kagenti-system).
    # RHOAI-managed MLflow creates its Route in redhat-ods-applications;
    # set routeNamespace: "redhat-ods-applications" when using RHOAI.
    routeNamespace: ""
    # Path prefix where MLflow UI is served (appended to the route URL).
    # RHOAI MLflow uses --static-prefix=/mlflow by default.
    routePath: "/mlflow"

# Secrets — override via a .secrets.yaml file or --set secrets.<key>=<value>.
# githubUser/githubToken are optional: only needed to deploy agents/tools from
# private GitHub repos or pull images from private registries.
secrets:
  githubUser: ""
  githubToken: ""
  openaiApiKey: ""
  slackBotToken: ""
  adminSlackBotToken: ""
  quayUser: ""
  quayToken: ""

common:
  kubectlImage: "quay.io/kubestellar/kubectl:1.30.14"
  oseCLIImage: "registry.redhat.io/openshift4/ose-cli:v4.15"

# ------------------------------------------------------------------
#  Components Configurations
# ------------------------------------------------------------------

# ------------------------------------------------------------------
#  Agents Namespaces
# ------------------------------------------------------------------
agentNamespaces:
- team1
- team2

# ------------------------------------------------------------------
#  UI Configuration
# ------------------------------------------------------------------
ui:
  configmap: kagenti-ui-config
  # Domain name for constructing service URLs (non-OpenShift only)
  domainName: localtest.me
  auth:
    enabled: true
  namespace: kagenti-system
  hostname: kagenti-ui.localtest.me
  url: http://kagenti-ui.localtest.me:8080
  # Frontend (UI v2) configuration
  frontend:
    enabled: true
    image: ghcr.io/kagenti/kagenti/ui-v2
    tag: v0.7.0-alpha.3
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 25m
        memory: 64Mi
  # Backend API external access
  api:
    hostname: kagenti-api.localtest.me
  # Backend configuration
  backend:
    image: ghcr.io/kagenti/kagenti/backend
    tag: v0.7.0-alpha.3
    # Default registry for source-based builds (Kind: registry.cr-system.svc.cluster.local:5000)
    defaultRegistryUrl: ""
    # Default Shipwright build strategy for internal registries
    # Kind: "buildah-insecure-push" (no TLS), OCP: "buildah" (TLS-enabled registry)
    shipwrightDefaultStrategy: ""
    resources:
      limits:
        cpu: 250m
        # Increased from 256Mi to 512Mi to support sandbox agent workloads
        # (exec streaming, log tailing, and concurrent K8s API calls)
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi

# ------------------------------------------------------------------
#  UI OAuth Secret Creator Configuration
# ------------------------------------------------------------------
uiOAuthSecret:
  image: ghcr.io/kagenti/kagenti/ui-oauth-secret
  tag: v0.7.0-alpha.3
  # When true, mount the in-cluster serviceaccount CA
  # into the ui-oauth-secret job via the SSL_CERT_FILE environment variable.
  # When false, the serviceaccount CA is only for the API server
  # and will usually not validate external OpenShift route certificates.
  useServiceAccountCA: true

# ------------------------------------------------------------------
#  Agent OAuth Secret Creator Configuration
# ------------------------------------------------------------------
agentOAuthSecret:
  image: ghcr.io/kagenti/kagenti/agent-oauth-secret
  tag: v0.7.0-alpha.3
  # When true, mount the in-cluster serviceaccount CA
  # into the agent-oauth-secret job via the SSL_CERT_FILE environment variable.
  # When false, the serviceaccount CA is only for the API server
  # and will usually not validate external OpenShift route certificates.
  useServiceAccountCA: false
  spiffePrefix: spiffe://localtest.me/sa
  clientName: kagenti-keycloak-client

# ------------------------------------------------------------------
#  API OAuth Secret Creator Configuration
#  Creates a confidential client for programmatic API access via
#  Client Credentials Grant. The credentials are stored in a K8s secret.
#  WARNING: This is a shared credential for testing/dev only.
# ------------------------------------------------------------------
apiOAuthSecret:
  enabled: false
  image: ghcr.io/kagenti/kagenti/api-oauth-secret
  tag: v0.7.0-alpha.3
  # Client ID for the API service account
  clientId: kagenti-api
  # Name of the K8s secret to store credentials
  secretName: kagenti-api-oauth-secret
  # Realm role to assign to the service account
  serviceAccountRole: kagenti-operator
  # When true, use the in-cluster serviceaccount CA for SSL verification
  useServiceAccountCA: false

# ------------------------------------------------------------------
#  Keycloak Configuration
# ------------------------------------------------------------------
keycloak:
  enabled: true
  namespace: keycloak
  adminSecretName: keycloak-initial-admin
  adminUsernameKey: username
  adminPasswordKey: password
  url: http://keycloak-service.keycloak:8080
  publicUrl: http://keycloak.localtest.me:8080
  realm: kagenti
  autoBootstrapRealm: true
  # Session/token lifetimes for long-running dev clusters (e.g. Kind).
  # Keycloak defaults (30min idle, 10h max) cause "Signature has expired"
  # errors after a few hours. These values extend lifetimes for dev use.
  #
  # ⚠️  PRODUCTION WARNING: These defaults are intentionally permissive for
  # developer convenience. For production deployments, override with values
  # appropriate for your security policy (e.g. 30min idle, 8h max session).
  # Long-lived sessions increase the window for token theft/session hijacking.
  sessionLifetimes:
    # SSO Session Idle timeout in seconds (default: 7 days)
    # Keycloak default is 1800 (30 min)
    ssoSessionIdle: 604800
    # SSO Session Max lifespan in seconds (default: 30 days)
    # Keycloak default is 36000 (10 hours)
    ssoSessionMax: 2592000
    # Access token lifespan in seconds (default: 30 min)
    # Keycloak default is 300 (5 min)
    accessTokenLifespan: 1800

# ------------------------------------------------------------------
#  AuthBridge Configuration
# ------------------------------------------------------------------
authBridge:
  # CLIENT_AUTH_TYPE: Controls how Keycloak clients authenticate
  #   - "client-secret": Traditional client_secret authentication (default)
  #   - "federated-jwt": JWT-SVID authentication via SPIFFE identity provider
  # For federated-jwt, you must configure a SPIFFE identity provider in Keycloak
  clientAuthType: "client-secret"
  # SPIFFE_IDP_ALIAS: Keycloak SPIFFE identity provider alias (only used with federated-jwt)
  spiffeIdpAlias: "spire-spiffe"
  # How long AuthBridge fast-polls for credential files before switching to backoff
  credentialWaitTimeout: "120s"
  # Full authbridge pipeline configuration (single source of truth).
  # SREs modify this block to change inbound/outbound plugins.
  # Helm template expressions ({{ .Values.* }}) are supported — they are
  # evaluated at render time via tpl().
  pipeline: |
    inbound:
      plugins:
        - name: jwt-validation
          config:
            issuer: "{{ .Values.keycloak.publicUrl }}/realms/{{ .Values.keycloak.realm }}"
            keycloak_url: "http://keycloak-service.{{ .Values.keycloak.namespace }}.svc:8080"
            keycloak_realm: {{ .Values.keycloak.realm | quote }}
    outbound:
      plugins:
        - name: token-exchange
          config:
            keycloak_url: "http://keycloak-service.{{ .Values.keycloak.namespace }}.svc:8080"
            keycloak_realm: {{ .Values.keycloak.realm | quote }}
            default_policy: "passthrough"
            identity:
              type: {{ eq .Values.authBridge.clientAuthType "federated-jwt" | ternary "spiffe" .Values.authBridge.clientAuthType | quote }}
              {{- if eq .Values.authBridge.clientAuthType "federated-jwt" }}
              jwt_audience: "{{ .Values.keycloak.publicUrl }}/realms/{{ .Values.keycloak.realm }}"
              {{- end }}

# ------------------------------------------------------------------
#  SPIFFE Identity Provider Setup Job Configuration
#  (Only runs when SPIRE is enabled)
# ------------------------------------------------------------------
spiffeIdp:
  image:
    repository: ghcr.io/kagenti/kagenti/spiffe-idp-setup
    tag: v0.7.0-alpha.3
    pullPolicy: IfNotPresent

# ------------------------------------------------------------------
#  Kagenti Operator Configuration (includes AuthBridge webhook)
# ------------------------------------------------------------------
kagenti-operator-chart:
  controllerManager:
    container:
      cmd: /manager
      image:
        tag: 0.3.0-alpha.4
      args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
      - "--webhook-cert-path=/tmp/k8s-webhook-server/serving-certs"
      - "--config-path=/etc/kagenti/config.yaml"
      - "--feature-gates-path=/etc/kagenti/feature-gates/feature-gates.yaml"
      # Client registration controller is enabled by default (operator-managed)
      resources:
        limits:
          cpu: 150m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
  # SPIRE trust domain — used by the operator's ClientRegistrationReconciler to derive
  # SPIFFE-based client IDs. On OCP, auto-discovery from ZTWIM CR works; on Kind,
  # the explicit value is required because neither ZTWIM nor spire-bundle exist at startup.
  signatureVerification:
    spireTrustDomain: localtest.me

# ------------------------------------------------------------------
#  Kagenti Operator SPIFFE Authentication
# ------------------------------------------------------------------
# Configuration for operator SPIFFE authentication to Keycloak
kagentiOperator:
  namespace: kagenti-operator-system
  serviceAccountName: controller-manager
  spiffeAuth:
    # Enable SPIFFE authentication for operator (authenticates with JWT-SVID instead of admin credentials)
    enabled: false
    # Operator's SPIFFE ID (auto-generated if not set)
    operatorClientID: ""
    # Bootstrap job image (Python-based Keycloak configuration)
    bootstrapImage: "ghcr.io/kagenti/kagenti/operator-spiffe-bootstrap:v0.1.0"

# ------------------------------------------------------------------
#  SPIFFE Configuration
# ------------------------------------------------------------------
spiffe:
  # SPIFFE Identity Provider alias in Keycloak
  idpAlias: "spire-spiffe"
  # SPIRE OIDC Discovery Provider URL
  oidcDiscoveryURL: "http://spire-spiffe-oidc-discovery-provider.zero-trust-workload-identity-manager.svc:8080"

# Trust domain (used for SPIFFE IDs)
spireTrustDomain: localtest.me
  # Pin sidecar image tags injected by the AuthBridge webhook.
  #
  # After kagenti-extensions#411 there are three combined images:
  #   * authbridge      — proxy-sidecar mode (default), full plugin set
  #                       including the a2a/mcp/inference parsers.
  #   * authbridge-envoy — envoy-sidecar mode, full plugin set, expects
  #                       proxyInit's iptables setup.
  #   * authbridge-lite  — proxy-sidecar shape, auth-only plugins
  #                       (parsers dropped). For size-constrained deployments;
  #                       not selected by default.
  # Spiffe-helper is bundled inside each combined image and gated per
  # workload by the SPIRE_ENABLED env var; it is no longer a separate
  # sidecar. Client registration is operator-managed.
  defaults:
    images:
      authbridge: ghcr.io/kagenti/kagenti-extensions/authbridge:v0.6.0-alpha.7
      envoyProxy: ghcr.io/kagenti/kagenti-extensions/authbridge-envoy:v0.6.0-alpha.7
      authbridgeLite: ghcr.io/kagenti/kagenti-extensions/authbridge-lite:v0.6.0-alpha.7
      proxyInit: ghcr.io/kagenti/kagenti-extensions/proxy-init:v0.6.0-alpha.7

# ------------------------------------------------------------------
#  MCP Gateway Configuration
# ------------------------------------------------------------------
mcpGateway:
  namespaces:
    mcpSystem: mcp-system
    gatewaySystem: gateway-system
  # Hostname used for the Gateway listener on non-OpenShift (Kind) clusters.
  hostname: 'mcp.127-0-0-1.sslip.io'
  # On OpenShift, the Gateway listener hostname is auto-constructed from this
  # domain to match the auto-generated Route hostname. Override in ocp_values.yaml.
  openshiftDomain: ''

# ------------------------------------------------------------------
#  Phoenix Configuration
# ------------------------------------------------------------------
phoenix:
  namespace: kagenti-system
  # Domain name for constructing service URLs (non-OpenShift only)
  url: http://phoenix.localtest.me:8080
  auth:
    # Enable Keycloak OAuth2 authentication for Phoenix dashboard
    enabled: true

# ------------------------------------------------------------------
#  Phoenix OAuth Secret Creator Configuration
# ------------------------------------------------------------------
phoenixOAuthSecret:
  image: ghcr.io/kagenti/kagenti/phoenix-oauth-secret
  tag: v0.7.0-alpha.3
  # Keycloak client ID for Phoenix
  clientId: phoenix
  # Kubernetes secret name to store OAuth credentials
  secretName: phoenix-oauth-secret
  # When true, mount the in-cluster serviceaccount CA
  # into the phoenix-oauth-secret job via the SSL_CERT_FILE environment variable.
  useServiceAccountCA: true

# ------------------------------------------------------------------
#  MLflow Configuration
# ------------------------------------------------------------------
mlflow:
  namespace: kagenti-system
  # Domain name for constructing service URLs (non-OpenShift only)
  url: http://mlflow.localtest.me:8080
  auth:
    # Enable Keycloak OAuth2 authentication for MLflow
    # Set to true in ocp_values.yaml for production deployments
    enabled: false
    # Kubernetes secret name containing OAuth credentials
    secretName: mlflow-oauth-secret

# ------------------------------------------------------------------
#  MLflow OAuth Secret Creator Configuration
# ------------------------------------------------------------------
mlflowOAuthSecret:
  image: ghcr.io/kagenti/kagenti/mlflow-oauth-secret
  tag: v0.7.0-alpha.3
  # Keycloak client ID for MLflow
  clientId: mlflow
  # Kubernetes secret name to store OAuth credentials
  secretName: mlflow-oauth-secret
  # When true, mount the in-cluster serviceaccount CA
  # into the mlflow-oauth-secret job via the SSL_CERT_FILE environment variable.
  useServiceAccountCA: true

# ------------------------------------------------------------------
#  Spiffe/Spire configs
# ------------------------------------------------------------------
spire:
  enabled: true

# ------------------------------------------------------------------
#  OpenShell Configuration
# ------------------------------------------------------------------
openshell:
  enabled: false
  gateway:
    image: ghcr.io/kagenti/openshell/gateway
    tag: v0.0.56
    pullPolicy: IfNotPresent
  computeDriver:
    image: ghcr.io/kagenti/openshell-driver-openshift/compute-driver
    tag: v0.1.0-rc.4
    pullPolicy: IfNotPresent
  credentialsDriver:
    image: ghcr.io/kagenti/openshell-credentials-keycloak/credentials-driver
    tag: main-d7d8306
    pullPolicy: IfNotPresent
