# This template creates only the agent namespace resources as a pre-install hook.
# Secrets, ConfigMaps, and RoleBindings are in agent-namespace-resources.yaml (no hook).
# This separation ensures hooks complete quickly - only 2 small Namespace objects.
# See https://github.com/kagenti/kagenti/issues/XXXX for context.
{{- include "kagenti.authBridge.validateSpiffeIdentity" . -}}
{{- if .Values.agentNamespaces }}
{{- $root := . }}
{{- range $root.Values.agentNamespaces }}
---
# ——————————————————————————————————————————————————————————————————————————————
#  Namespace: {{ . }}
#  Creates the namespace and applies Istio/Gateway labels.
# ——————————————————————————————————————————————————————————————————————————————
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  annotations:
    # Create agent namespaces as pre-install hook BEFORE other hooks
    # This ensures namespaces exist when agent-oauth-secret-job (weight 20, 50) runs
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    kagenti-enabled: "true"
    istio-discovery: enabled
    istio.io/dataplane-mode: ambient
    istio.io/use-waypoint: waypoint
    shared-gateway-access: "true"
    {{- if $root.Values.openshift }}
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    {{- end }}
  {{- include "kagenti.labels" $root | nindent 4 }}
{{- end }}
{{- end }}
