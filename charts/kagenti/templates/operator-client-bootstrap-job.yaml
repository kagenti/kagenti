{{- if and (index .Values "kagenti-operator-chart") (index .Values "kagenti-operator-chart" "spiffe") (index .Values "kagenti-operator-chart" "spiffe" "operatorAuth") (index .Values "kagenti-operator-chart" "spiffe" "operatorAuth" "enabled") }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kagenti-operator-client-bootstrap
  namespace: {{ .Values.keycloak.namespace | default "keycloak" }}
  labels:
    app.kubernetes.io/name: kagenti-operator-client-bootstrap
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/part-of: kagenti
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "100"
    helm.sh/hook-delete-policy: before-hook-creation
---
# Role in keycloak namespace to read admin secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kagenti-operator-client-bootstrap
  namespace: {{ .Values.keycloak.namespace | default "keycloak" }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "100"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["keycloak-initial-admin"]
  verbs: ["get"]
---
# RoleBinding grants the ServiceAccount access to read the Keycloak admin secret
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kagenti-operator-client-bootstrap
  namespace: {{ .Values.keycloak.namespace | default "keycloak" }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "100"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kagenti-operator-client-bootstrap
subjects:
- kind: ServiceAccount
  name: kagenti-operator-client-bootstrap
  namespace: {{ .Values.keycloak.namespace | default "keycloak" }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kagenti-operator-client-bootstrap
  namespace: {{ .Values.keycloak.namespace | default "keycloak" }}
  labels:
    app.kubernetes.io/name: kagenti-operator-client-bootstrap
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/part-of: kagenti
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "200"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagenti-operator-client-bootstrap
        app.kubernetes.io/component: bootstrap
    spec:
      serviceAccountName: kagenti-operator-client-bootstrap
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        # NOTE: operator-spiffe-bootstrap has not been published yet; :latest is a placeholder
        # until the image is built and pushed as part of the release pipeline.
        # Override via kagenti-operator-chart.spiffe.operatorAuth.bootstrapImage.
        image: {{ (index .Values "kagenti-operator-chart" "spiffe" "operatorAuth" "bootstrapImage") | default "ghcr.io/kagenti/kagenti/operator-spiffe-bootstrap:latest" }}
        imagePullPolicy: IfNotPresent
        env:
        - name: KEYCLOAK_URL
          value: "http://keycloak-service.{{ .Values.keycloak.namespace | default "keycloak" }}.svc:8080"
        - name: KEYCLOAK_REALM
          value: "{{ .Values.keycloak.realm | default "kagenti" }}"
        - name: KEYCLOAK_ADMIN_SECRET_NAME
          value: "keycloak-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NAMESPACE
          value: "{{ .Values.keycloak.namespace | default "keycloak" }}"
        - name: KEYCLOAK_ADMIN_USERNAME_KEY
          value: "username"
        - name: KEYCLOAK_ADMIN_PASSWORD_KEY
          value: "password"
        - name: SPIFFE_IDP_ALIAS
          value: "{{ .Values.spiffe.idpAlias | default "spire-spiffe" }}"
        - name: SPIRE_OIDC_URL
          value: "{{ .Values.spiffe.oidcDiscoveryURL | default "http://spire-spiffe-oidc-discovery-provider.zero-trust-workload-identity-manager.svc:8080" }}"
        # SPIFFE trust domain - used to derive operator's SPIFFE ID
        - name: SPIFFE_TRUST_DOMAIN
          value: "{{ .Values.spireTrustDomain | default "localtest.me" }}"
        # Operator namespace and ServiceAccount - used to derive SPIFFE ID
        # The bootstrap script constructs: spiffe://<trust-domain>/ns/<namespace>/sa/<service-account>
        # Namespace is where the operator subchart is actually deployed
        - name: OPERATOR_NAMESPACE
          value: "{{ .Release.Namespace }}"
        - name: OPERATOR_SERVICE_ACCOUNT
          # Read from the operator subchart to ensure consistency with actual operator SA
          value: "{{ index .Values "kagenti-operator-chart" "controllerManager" "serviceAccountName" | default "controller-manager" }}"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
{{- end }}
