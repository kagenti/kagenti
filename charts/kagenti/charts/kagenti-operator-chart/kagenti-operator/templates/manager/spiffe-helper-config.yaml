{{- if and .Values.spiffe.enabled .Values.spiffe.operatorAuth.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagenti-operator-spiffe-helper-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  config.hcl: |
    agent_address = "{{ .Values.spiffe.operatorAuth.spiffeHelper.agentSocketPath }}"
    cmd = ""
    cmd_args = ""
    cert_dir = ""
    renew_signal = ""
    svid_file_name = ""
    svid_key_file_name = ""
    svid_bundle_file_name = ""
    jwt_audience = "{{ .Values.spiffe.operatorAuth.spiffeHelper.jwtAudience }}"
    jwt_svid_file_name = "{{ .Values.spiffe.operatorAuth.spiffeHelper.jwtSvidFilePath }}"
{{- end }}
