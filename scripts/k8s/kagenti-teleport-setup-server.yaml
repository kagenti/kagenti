apiVersion: v1
kind: ConfigMap
metadata:
  name: kagenti-teleport-setup-server
  namespace: team1
data:
  serve.py: |
    #!/usr/bin/env python3
    """HTTP server with ETag support (RFC 9110 Section 8.8) for kagenti-teleport-setup files.

    Features:
    - Strong ETag based on SHA-256 content hash
    - Conditional requests: If-None-Match returns 304 Not Modified
    - HEAD requests return ETag without body (cheap sync check)
    - /checksums endpoint returns JSON {filename: etag} for all files
    """
    import hashlib
    import http.server
    import json
    import os
    import pathlib
    import socketserver

    PORT = int(os.environ.get("PORT", "8080"))
    DIRECTORY = os.environ.get("CONTENT_DIR", "/srv/content")

    def compute_etag(filepath: str) -> str:
        """Compute strong ETag as SHA-256 hex digest (RFC 9110 Section 8.8.3)."""
        h = hashlib.sha256()
        with open(filepath, "rb") as f:
            for chunk in iter(lambda: f.read(8192), b""):
                h.update(chunk)
        return f'"{h.hexdigest()}"'

    DEV_PREFIX = "/dev/"
    DEV_FILE_PREFIX = "dev--"

    class Handler(http.server.SimpleHTTPRequestHandler):
        def __init__(self, *args, **kwargs):
            super().__init__(*args, directory=DIRECTORY, **kwargs)

        def _resolve_path(self):
            """Resolve request path to filesystem path, handling /dev/ prefix.

            Returns (fs_path, is_dev). For /dev/foo.py, looks up dev--foo.py on disk.
            """
            if self.path.startswith(DEV_PREFIX):
                rel = self.path[len(DEV_PREFIX):]
                fs_name = DEV_FILE_PREFIX + rel
                fs_path = os.path.join(DIRECTORY, fs_name)
                return fs_path, True
            return self.translate_path(self.path), False

        def send_head(self):
            """Override to add ETag and handle If-None-Match (conditional GET/HEAD)."""
            if self.path == "/health":
                return None
            if self.path == "/checksums" or self.path == "/dev/checksums":
                return None

            path, is_dev = self._resolve_path()
            if not os.path.isfile(path):
                if is_dev:
                    self.send_error(404, "File not found")
                    return None
                return super().send_head()

            etag = compute_etag(path)

            # RFC 9110 Section 13.1.2: If-None-Match
            inm = self.headers.get("If-None-Match")
            if inm:
                client_tags = [t.strip() for t in inm.split(",")]
                if etag in client_tags or "*" in client_tags:
                    self.send_response(304)
                    self.send_header("ETag", etag)
                    self.send_header("Cache-Control", "no-cache")
                    self.end_headers()
                    return None

            if is_dev:
                return self._send_file(path)

            f = super().send_head()
            return f

        def _send_file(self, path):
            """Open and send a file directly (for dev channel files)."""
            import io
            try:
                f = open(path, "rb")
            except OSError:
                self.send_error(404, "File not found")
                return None
            fs = os.fstat(f.fileno())
            self.send_response(200)
            self.send_header("Content-Length", str(fs.st_size))
            self.send_header("ETag", compute_etag(path))
            self.send_header("Cache-Control", "no-cache")
            if path.endswith(".py") or path.endswith(".sh"):
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Disposition", "inline")
            self.send_header("X-Content-Type-Options", "nosniff")
            self.end_headers()
            return f

        def end_headers(self):
            path = self.translate_path(self.path)
            if os.path.isfile(path):
                self.send_header("ETag", compute_etag(path))
                self.send_header("Cache-Control", "no-cache")
            if self.path.endswith(".py") or self.path.endswith(".sh"):
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Disposition", "inline")
            self.send_header("X-Content-Type-Options", "nosniff")
            super().end_headers()

        def do_HEAD(self):
            """HEAD returns headers (including ETag) without body."""
            f = self.send_head()
            if f:
                f.close()

        def do_GET(self):
            if self.path == "/health":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"ok\n")
                return
            if self.path == "/checksums":
                self._serve_checksums(dev=False)
                return
            if self.path == "/dev/checksums":
                self._serve_checksums(dev=True)
                return
            f = self.send_head()
            if f:
                try:
                    self.copyfile(f, self.wfile)
                finally:
                    f.close()

        def _serve_checksums(self, dev=False):
            """Return JSON mapping of filename -> ETag for served files."""
            content_dir = pathlib.Path(DIRECTORY)
            checksums = {}
            for p in sorted(content_dir.iterdir()):
                if not p.is_file() or p.name.startswith("."):
                    continue
                if dev:
                    if p.name.startswith(DEV_FILE_PREFIX):
                        public_name = p.name[len(DEV_FILE_PREFIX):]
                        checksums[public_name] = compute_etag(str(p))
                else:
                    if not p.name.startswith(DEV_FILE_PREFIX):
                        checksums[p.name] = compute_etag(str(p))
            body = json.dumps(checksums, indent=2).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.send_header("Cache-Control", "no-cache")
            self.end_headers()
            self.wfile.write(body)

    with socketserver.TCPServer(("", PORT), Handler) as httpd:
        print(f"Serving {DIRECTORY} on port {PORT}")
        httpd.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagenti-teleport-setup
  namespace: team1
  labels:
    app: kagenti-teleport-setup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kagenti-teleport-setup
  template:
    metadata:
      labels:
        app: kagenti-teleport-setup
    spec:
      containers:
      - name: server
        image: registry.access.redhat.com/ubi9/python-311:latest
        command: ["python3", "/opt/server/serve.py"]
        env:
        - name: PORT
          value: "8080"
        - name: CONTENT_DIR
          value: "/srv/content"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: content
          mountPath: /srv/content
          readOnly: true
        - name: server-script
          mountPath: /opt/server
          readOnly: true
      volumes:
      - name: content
        configMap:
          name: kagenti-teleport-setup
      - name: server-script
        configMap:
          name: kagenti-teleport-setup-server
---
apiVersion: v1
kind: Service
metadata:
  name: kagenti-teleport-setup
  namespace: team1
  labels:
    app: kagenti-teleport-setup
spec:
  type: ClusterIP
  selector:
    app: kagenti-teleport-setup
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kagenti-teleport-setup
  namespace: team1
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  port:
    targetPort: http
  to:
    kind: Service
    name: kagenti-teleport-setup
    weight: 100
  wildcardPolicy: None
