# Documentation CI — markdown lint and link check
#
# Runs on PRs that touch markdown or documentation files.
# All jobs are read-only and safe for fork PRs (no secrets required).
name: Docs CI

on:
  pull_request:
    branches: [main, "release-*"]
    paths:
      - "**.md"
      - "docs/**"
      - ".github/workflows/docs-ci.yaml"
      - ".markdownlint-cli2.yaml"
      - ".lychee.toml"

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe  # v24.1.0
        with:
          globs: "**/*.md"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8  # v2.9.0
        with:
          args: >-
            --config .lychee.toml
            "**/*.md"
          fail: false
