name: kubectl-kagenti
on:
  push:
    branches: [main, master, 'feat/**']
    paths:
      - 'kagenti/kubectl-kagenti/**'
      - '.github/workflows/kubectl-kagenti.yml'
  pull_request:
    paths:
      - 'kagenti/kubectl-kagenti/**'
      - '.github/workflows/kubectl-kagenti.yml'

defaults:
  run:
    working-directory: kagenti/kubectl-kagenti

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
      - run: go build -o /dev/null ./cmd/kubectl-kagenti
