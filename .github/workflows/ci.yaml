name: CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Explicit permissions - principle of least privilege
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Install dependencies
        run: |
          uv tool install ruff==0.15.12
          uv tool install pytest==9.0.3
          uv tool install pre-commit==4.6.0
          if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi

      - name: Lint with ruff
        run: |
          # Rule selection is in pyproject.toml [tool.ruff.lint]
          ruff check .
          ruff format --check .

      - name: Run pre-commit hooks
        run: |
          echo "Running pre-commit hooks..."
          pre-commit run --all-files --verbose || {
            echo "Pre-commit hooks failed!"
            echo ""
            echo "Files modified by hooks:"
            git diff --name-only
            echo ""
            echo "Detailed changes:"
            git diff --stat
            exit 1
          }

      # Note: E2E tests are run in the e2e-kind.yaml and e2e-hypershift.yaml
      # workflows which have full Kubernetes clusters with Kagenti deployed

  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kagenti/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run backend unit tests with coverage
        run: |
          uv run pytest --cov --cov-report=term-missing --cov-report=xml:coverage.xml -v \
            --ignore=tests/test_migration.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: backend-coverage
          path: kagenti/backend/coverage.xml
          retention-days: 30

  tui:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: kagenti/tui

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: kagenti/tui/go.mod
          cache-dependency-path: kagenti/tui/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

      - name: Build
        run: go build ./...

  chart-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.20.1

      - name: Install helm-unittest plugin
        # Pin the version — without --version, helm pulls the plugin's main
        # branch, whose install hook currently references a release tag
        # (v1.1.0) that does not exist on GitHub, causing checksum validation
        # to fail with "no properly formatted SHA checksum lines found".
        # v1.0.3 is the latest published release with a resolvable linux-amd64
        # tarball asset.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v1.0.3

      - name: Build chart dependencies
        run: |
          helm dependency build charts/kagenti-deps
          helm dependency build charts/kagenti

      - name: Run chart unit tests
        run: |
          helm unittest charts/kagenti-deps
          helm unittest charts/kagenti

      - name: Install kubeconform
        run: |
          ARCH=$(dpkg --print-architecture)
          curl -sSL "https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-${ARCH}.tar.gz" \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate rendered templates with kubeconform
        run: |
          helm template test charts/kagenti-deps \
            --set openshift=false \
            --set components.spire.enabled=false \
            | kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas

  ui-image-smoke:
    # Builds the kagenti-ui image and actually boots nginx. Manifest-only tests
    # (helm unittest/template) never start the container, so they cannot catch
    # nginx config errors — e.g. a duplicate worker_processes directive, which
    # is what regressed the kagenti#1991 fix. This job validates the config and
    # asserts worker_processes is pinned to a fixed count (not host-CPU `auto`).
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build kagenti-ui image (load locally, no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ./kagenti
          file: ./kagenti/ui-v2/Dockerfile
          push: false
          load: true
          tags: kagenti-ui-v2:ci-smoke

      - name: Smoke test - nginx config is valid and workers are pinned (kagenti#1991)
        run: |
          set -euo pipefail
          # `nginx -t` runs the base-image entrypoint then validates the full
          # config; a duplicate/invalid directive fails here with [emerg].
          docker run --rm kagenti-ui-v2:ci-smoke nginx -t
          # Dump the effective config and assert worker_processes is a fixed
          # count, not the host-CPU `auto` that OOMKilled the pod on large nodes.
          workers=$(docker run --rm kagenti-ui-v2:ci-smoke nginx -T 2>/dev/null \
            | awk '/^worker_processes/{gsub(/;/,"",$2); print $2; exit}')
          echo "effective worker_processes = '${workers}'"
          case "${workers}" in
            ''|auto)
              echo "::error::nginx worker_processes must be pinned to a fixed count (got '${workers}'). See kagenti#1991."
              exit 1
              ;;
          esac
