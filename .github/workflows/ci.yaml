name: CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Explicit permissions - principle of least privilege
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: |
          uv tool install ruff==0.15.12
          uv tool install pytest==9.0.3
          uv tool install pre-commit==4.6.0
          if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi

      - name: Lint with ruff
        run: |
          # Rule selection is in pyproject.toml [tool.ruff.lint]
          ruff check .
          ruff format --check .

      - name: Run pre-commit hooks
        run: |
          echo "Running pre-commit hooks..."
          pre-commit run --all-files --verbose || {
            echo "Pre-commit hooks failed!"
            echo ""
            echo "Files modified by hooks:"
            git diff --name-only
            echo ""
            echo "Detailed changes:"
            git diff --stat
            exit 1
          }

      # Note: E2E tests are run in the e2e-kind.yaml and e2e-hypershift.yaml
      # workflows which have full Kubernetes clusters with Rossoctl deployed

  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rossoctl/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run backend unit tests with coverage
        run: |
          uv run pytest --cov --cov-report=term-missing --cov-report=xml:coverage.xml -v \
            --ignore=tests/test_migration.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: backend-coverage
          path: rossoctl/backend/coverage.xml
          retention-days: 30

  tui:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: rossoctl/tui

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version-file: rossoctl/tui/go.mod
          cache-dependency-path: rossoctl/tui/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

      - name: Build
        run: go build ./...

  chart-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: v3.20.1

      - name: Install helm-unittest plugin
        # Pin the version — without --version, helm pulls the plugin's main
        # branch, whose install hook currently references a release tag
        # (v1.1.0) that does not exist on GitHub, causing checksum validation
        # to fail with "no properly formatted SHA checksum lines found".
        # v1.0.3 is the latest published release with a resolvable linux-amd64
        # tarball asset.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v1.0.3

      - name: Build chart dependencies
        run: |
          helm dependency build charts/rossoctl-deps
          helm dependency build charts/rossoctl

      - name: Run chart unit tests
        run: |
          helm unittest charts/rossoctl-deps
          helm unittest charts/rossoctl

      - name: Install kubeconform
        run: |
          ARCH=$(dpkg --print-architecture)
          curl -sSL "https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-${ARCH}.tar.gz" \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate rendered templates with kubeconform
        run: |
          helm template test charts/rossoctl-deps \
            --set openshift=false \
            --set components.spire.enabled=false \
            | kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas
