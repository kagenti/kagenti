name: Platform Operator CI

on:
  push:
    branches: ["main"]
    paths:
      - "platform-operator/**"
  pull_request:
    branches: ["main"]
    paths:
      - "platform-operator/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-operator
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: platform-operator/go.mod
          cache-dependency-path: platform-operator/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: platform-operator

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-operator
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: platform-operator/go.mod
          cache-dependency-path: platform-operator/go.sum

      - name: Generate manifests
        run: make generate manifests

      - name: Verify no diff after generation
        run: git diff --exit-code

      - name: Setup envtest
        run: make setup-envtest

      - name: Run tests
        run: |
          KUBEBUILDER_ASSETS=$(bin/setup-envtest use 1.32 -p path) \
            go test $(go list ./... | grep -v test/e2e) -v -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: platform-operator/coverage.out

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: platform-operator
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: platform-operator/go.mod
          cache-dependency-path: platform-operator/go.sum

      - name: Build binary
        run: go build -o bin/manager ./cmd/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image (test only)
        uses: docker/build-push-action@v6
        with:
          context: platform-operator
          push: false
          tags: ghcr.io/kagenti/kagenti-platform-operator:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: platform-operator
          push: true
          tags: |
            ghcr.io/kagenti/kagenti-platform-operator:latest
            ghcr.io/kagenti/kagenti-platform-operator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
